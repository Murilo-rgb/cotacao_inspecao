<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Distribuição de cotações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .dropzone {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
        }
        .dropzone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .dropzone.has-file {
            border-color: #10b981;
            background-color: #ecfdf5;
        }
        .checkbox-cell input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .selected-row {
            background-color: #eef2ff !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useCallback, useRef } = React;

        // ============== ICONES ==============
        const UploadIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "24", height: "24", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }),
            React.createElement('polyline', { points: "17 8 12 3 7 8" }),
            React.createElement('line', { x1: "12", y1: "3", x2: "12", y2: "15" })
        );
        const CheckIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "16", height: "16", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('polyline', { points: "20 6 9 17 4 12" })
        );
        const AlertIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" }),
            React.createElement('path', { d: "M12 9v4" }),
            React.createElement('path', { d: "M12 17h.01" })
        );
        const LogoutIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" }),
            React.createElement('polyline', { points: "16 17 21 12 16 7" }),
            React.createElement('line', { x1: "21", x2: "9", y1: "12", y2: "12" })
        );
        const RefreshIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('polyline', { points: "23 4 23 10 17 10" }),
            React.createElement('path', { d: "M20.49 15a9 9 0 1 1-2.12-9.36L23 10" })
        );
        const SendIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('line', { x1: "22", y1: "2", x2: "11", y2: "13" }),
            React.createElement('polygon', { points: "22 2 15 22 11 13 2 9 22 2" })
        );
        const FileIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }),
            React.createElement('polyline', { points: "14 2 14 8 20 8" })
        );
        const RedistributeIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('polyline', { points: "1 4 1 10 7 10" }),
            React.createElement('polyline', { points: "23 20 23 14 17 14" }),
            React.createElement('path', { d: "M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" })
        );

        // ============== COMPONENTE PRINCIPAL ==============
        function App() {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [username, setUsername] = useState(localStorage.getItem('username') || '');
            const [tarefas, setTarefas] = useState([]);
            const [usuarios, setUsuarios] = useState([]);
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [atualizando, setAtualizando] = useState(false);
            const [distribuindo, setDistribuindo] = useState(false);
            const [dragActive, setDragActive] = useState(false);
            const [fileInfo, setFileInfo] = useState(null);
            const [toast, setToast] = useState(null);
            const [stats, setStats] = useState({ total: 0, em_tratamento: 0, aprovado: 0, reprovado: 0, pendente: 0, cancelado: 0, desconsiderar: 0 });
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [massAssignUsuario, setMassAssignUsuario] = useState('');
            const [redistribuirMode, setRedistribuirMode] = useState(false);
            const fileInputRef = useRef(null);

            const getBasePath = () => window.location.pathname.startsWith('/pme_notas') ? '/pme_notas' : '';

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            // Verificar token
            useEffect(() => {
                const t = localStorage.getItem('token');
                if (!t) {
                    window.location.href = getBasePath() + '/login.html';
                    return;
                }
                setToken(t);
                const storedUser = localStorage.getItem('username');
                if (storedUser) setUsername(storedUser);
            }, []);

            // Buscar tarefas
            const fetchTarefas = useCallback(async () => {
                if (!token) return;
                try {
                    setLoading(true);
                    const res = await fetch(`${getBasePath()}/api/gestao/tarefas_net`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401 || res.status === 403) {
                        localStorage.removeItem('token');
                        window.location.href = getBasePath() + '/login.html';
                        return;
                    }
                    const data = await res.json();
                    setTarefas(data.data || []);
                    setStats({
                      total: data.total || 0,
                      em_tratamento: data.stats?.em_tratamento || 0,
                      aprovado: data.stats?.aprovado || 0,
                      reprovado: data.stats?.reprovado || 0,
                      pendente: data.stats?.pendente || 0,
                      cancelado: data.stats?.cancelado || 0,
                      desconsiderar: data.stats?.desconsiderar || 0
                    });
                } catch (err) {
                    console.error('Erro ao buscar tarefas:', err);
                    showToast('Erro ao carregar tarefas', 'error');
                } finally {
                    setLoading(false);
                }
            }, [token]);

            // Buscar usuários
            const fetchUsuarios = useCallback(async () => {
                if (!token) return;
                try {
                    const res = await fetch(`${getBasePath()}/api/gestao/usuarios`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setUsuarios(data);
                } catch (err) {
                    console.error('Erro ao buscar usuários:', err);
                }
            }, [token]);

            useEffect(() => {
                if (token) {
                    fetchTarefas();
                    fetchUsuarios();
                }
            }, [token, fetchTarefas, fetchUsuarios]);

            // Upload
            const handleUpload = async (file) => {
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext !== 'csv' && ext !== 'zip') {
                    showToast('Apenas arquivos .csv ou .zip são permitidos', 'error');
                    return;
                }
                
                setFileInfo({ name: file.name, size: (file.size / 1024 / 1024).toFixed(2) + ' MB' });
                setUploading(true);
                
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const res = await fetch(`${getBasePath()}/api/gestao/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    
                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message || 'Arquivo processado com sucesso!', 'success');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao processar arquivo', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao enviar arquivo: ' + err.message, 'error');
                } finally {
                    setUploading(false);
                }
            };

            // Drag & Drop handlers
            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') {
                    setDragActive(true);
                } else if (e.type === 'dragleave') {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleUpload(e.dataTransfer.files[0]);
                }
            };

            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files[0]) {
                    handleUpload(e.target.files[0]);
                }
            };

            // ===== SELEÇÃO EM MASSA =====
            const toggleSelect = (codTarefa) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(codTarefa)) {
                        next.delete(codTarefa);
                    } else {
                        next.add(codTarefa);
                    }
                    return next;
                });
            };

            const toggleSelectAll = () => {
                const visible = filteredTarefas;
                if (selectedIds.size === visible.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(visible.map(t => t.cod_tarefa)));
                }
            };

            const handleMassAssign = (usuarioId) => {
                let id = usuarioId;
                if (typeof usuarioId === 'string') {
                    const m = usuarioId.match(/^(\d+)\s*-/);
                    if (m) id = m[1];
                }
                setMassAssignUsuario(id);
                if (selectedIds.size === 0) {
                    showToast('Selecione ao menos uma tarefa primeiro', 'error');
                    return;
                }
                // Aplicar o usuário selecionado a todas as tarefas marcadas
                setTarefas(prev => prev.map(t =>
                    selectedIds.has(t.cod_tarefa)
                        ? { ...t, usuarioSelecionado: id }
                        : t
                ));
                showToast(`Usuário atribuído a ${selectedIds.size} tarefa(s)`, 'success');
            };

            // ===== DISTRIBUIR / REDISTRIBUIR =====
            const handleDistribuir = async () => {
                const podeDistribuir = (t) => {
                    if (redistribuirMode) {
                        // No modo redistribuir, aceita tarefas Fila OU Enviado com usuário selecionado
                        return t.usuarioSelecionado;
                    }
                    return t.status_distribuicao === 'Fila' && t.usuarioSelecionado;
                };

                const selecionadas = tarefas.filter(podeDistribuir);
                
                if (selecionadas.length === 0) {
                    showToast(
                        redistribuirMode 
                            ? 'Selecione tarefas e atribua um usuário para redistribuir' 
                            : 'Selecione usuários para as tarefas em "Fila"',
                        'error'
                    );
                    return;
                }

                // Proteção: verificar se muitas tarefas vão para o mesmo usuário
                const countPorUsuario = {};
                selecionadas.forEach(t => {
                    const uid = String(t.usuarioSelecionado);
                    countPorUsuario[uid] = (countPorUsuario[uid] || 0) + 1;
                });
                const usuarioNome = (id) => {
                    const u = usuarios.find(u => String(u.id) === String(id));
                    return u ? u.nome : id;
                };
                const alertas = Object.entries(countPorUsuario)
                    .filter(([uid, count]) => count > 10)
                    .map(([uid, count]) => `${count} para ${usuarioNome(uid)}`);
                
                if (alertas.length > 0) {
                    if (!window.confirm(`Muitas tarefas atribuídas para o mesmo usuário:\n${alertas.join('\n')}\n\nContinuar assim mesmo?`)) {
                        return;
                    }
                }
                
                setDistribuindo(true);
                
                const distribuicoes = selecionadas.map(t => ({
                    cod_tarefa: t.cod_tarefa,
                    usuario_id: parseInt(t.usuarioSelecionado)
                }));

                const endpoint = redistribuirMode 
                    ? `${getBasePath()}/api/gestao/redistribuir`
                    : `${getBasePath()}/api/gestao/distribuir`;
                const body = redistribuirMode
                    ? JSON.stringify({ redistribuicoes: distribuicoes })
                    : JSON.stringify({ distribuicoes });
                
                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body
                    });
                    
                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message, 'success');
                        setSelectedIds(new Set());
                        setMassAssignUsuario('');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao distribuir', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao distribuir: ' + err.message, 'error');
                } finally {
                    setDistribuindo(false);
                }
            };

            const handleAtualizar = async () => {
                try {
                    setAtualizando(true);
                    const res = await fetch(`${getBasePath()}/api/gestao/atualizar_input_net`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message || 'Dados atualizados com sucesso!', 'success');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao atualizar dados', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao atualizar: ' + err.message, 'error');
                } finally {
                    setAtualizando(false);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                window.location.href = getBasePath() + '/login.html';
            };

            const updateUsuarioSelecionado = (codTarefa, usuarioId) => {
                let id = usuarioId;
                if (typeof usuarioId === 'string') {
                    const m = usuarioId.match(/^(\d+)\s*-/);
                    if (m) id = m[1];
                }
                setTarefas(prev => prev.map(t =>
                    t.cod_tarefa === codTarefa
                        ? { ...t, usuarioSelecionado: id }
                        : t
                ));
            };

            const getUserLabel = (id) => {
                if (!id) return '';
                const u = usuarios.find(u => String(u.id) === String(id));
                return u ? `${u.id} - ${u.nome} (${u.login})` : String(id);
            };

            // Formatar data
            const formatDate = (dateStr) => {
                if (!dateStr || dateStr === '-') return '-';
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    return d.toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch { return dateStr; }
            };

            const [filters, setFilters] = useState({
                cod_tarefa: '',
                dat_historico: '',
                status_tarefa: '',
            });

            const updateFilter = (key, value) => {
                setFilters(prev => ({ ...prev, [key]: value }));
            };

            const matches = (val, filter) => {
                if (!filter) return true;
                try {
                    return String(val || '').toLowerCase().includes(String(filter).toLowerCase());
                } catch { return false; }
            };

            const displayCodTarefa = (t) => {
                try {
                    return t?.dsc_cotacao ? `${t.dsc_cotacao} - ${t.cod_tarefa}` : t.cod_tarefa;
                } catch { return t.cod_tarefa; }
            };

            const filteredTarefas = tarefas.filter(t => {
                if (!(
                    matches(displayCodTarefa(t), filters.cod_tarefa) &&
                    matches(formatDate(t.data_historico || t.dat_historico), filters.dat_historico)
                )) return false;

                const sf = filters.status_tarefa;
                if (sf && sf !== '') {
                    const etapa = (t.para_etapa || '').toString().trim();
                    const enviado = !!(t.usuario_distribuido_nome && String(t.usuario_distribuido_nome).trim() !== '' && String(t.usuario_distribuido_nome).trim() !== '-');
                    
                    if (sf === 'Pendente') {
                        if (etapa !== '01 - Pendente Input' || !enviado) return false;
                    } else if (sf === 'Aprovado') {
                        if (etapa !== '05 - Crédito' && etapa !== '04 - Inspeção') return false;
                    } else if (sf === 'Reprovado') {
                        if (etapa !== '03 - Aguardando Correção') return false;
                    } else if (sf === 'NAO_ASSUMIDO') {
                        if (etapa !== '01 - Pendente Input' || enviado) return false;
                    } else {
                        const status = classificarStatusTarefa(t);
                        if (status.toLowerCase() !== sf.toLowerCase()) return false;
                    }
                }

                return true;
            });

            const historyColorClass = (dateStr) => {
                if (!dateStr || dateStr === '-') return 'bg-slate-300';
                try {
                    const then = new Date(dateStr);
                    if (isNaN(then.getTime())) return 'bg-slate-300';
                    const diffHours = (Date.now() - then.getTime()) / (1000 * 60 * 60);
                    if (diffHours <= 6) return 'bg-emerald-500';
                    if (diffHours <= 12) return 'bg-yellow-500';
                    return 'bg-red-600';
                } catch { return 'bg-slate-300'; }
            };

            const classificarStatusTarefa = (t) => {
                try {
                    if (!t) return '-';
                    const etapa = (t.para_etapa || '').toString().trim();
                    const enviado = !!(t.usuario_distribuido_nome && String(t.usuario_distribuido_nome).trim() !== '' && String(t.usuario_distribuido_nome).trim() !== '-');
                    if (etapa === '01 - Pendente Input') {
                        return enviado ? 'Pendente' : 'Não Assumido';
                    }
                    if (etapa === '05 - Crédito' || etapa === '04 - Inspeção') return 'Aprovado';
                    if (etapa === '03 - Aguardando Correção') return 'Reprovado';
                    return etapa || '-';
                } catch (e) { return '-'; }
            };

            // Toast component
            const Toast = ({ toast }) => {
                if (!toast) return null;
                return React.createElement('div', {
                    className: `fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-slideUp ${
                        toast.type === 'success' ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'
                    }`
                },
                    toast.type === 'success' ? React.createElement(CheckIcon) : React.createElement(AlertIcon),
                    React.createElement('span', { className: 'font-medium text-sm' }, toast.message)
                );
            };

            const tarefasFila = tarefas.filter(t => t.status_distribuicao === 'Fila');

            const allSelected = filteredTarefas.length > 0 && selectedIds.size === filteredTarefas.length;

            return React.createElement('div', { className: 'min-h-screen bg-slate-50/80' },
                // Header
                React.createElement('header', { className: 'bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
                        React.createElement('div', { className: 'flex justify-between items-center h-16' },
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('div', { className: 'w-10 h-10 bg-gradient-to-br from-violet-600 to-purple-700 rounded-xl flex items-center justify-center shadow-md' },
                                    React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", className: "h-5 w-5 text-white", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: 2 },
                                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M9 5H7a2 2 0 002v12a2 2 0 002 2h10a2 2 0 002-2V7.5L14.5 2z" })
                                    )
                                ),
                                React.createElement('div', null,
                                    React.createElement('h1', { className: 'text-xl font-bold text-slate-800' }, 'Distribuição de cotações'),
                                    React.createElement('p', { className: 'text-xs text-slate-500' }, 'Upload, visualização e distribuição de tarefas')
                                )
                            ),
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('a', {
                                    href: `${getBasePath()}/gestao/dashboard`,
                                    className: 'flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors'
                                },
                                    React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "14", height: "14", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
                                        React.createElement('line', { x1: "18", y1: "20", x2: "18", y2: "10" }),
                                        React.createElement('line', { x1: "12", y1: "20", x2: "12", y2: "4" }),
                                        React.createElement('line', { x1: "6", y1: "20", x2: "6", y2: "14" })
                                    ),
                                    'Dashboard'
                                ),
                                React.createElement('button', {
