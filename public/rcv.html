            React.createElement('path', { d: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" })
        );

        // === Main App ===
        function App() {
            const [rcvList, setRcvList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [dateStart, setDateStart] = useState('');
            const [filtroFila, setFiltroFila] = useState('');
            const [filtroEtapa, setFiltroEtapa] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage] = useState(15);
            const [detailModal, setDetailModal] = useState(null);
            const [username, setUsername] = useState('');
            const [toast, setToast] = useState(null);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('darkMode');
                return saved === 'true';
            });

            const BASE_PATH = window.location.pathname.startsWith('/pme_notas') ? '/pme_notas' : '';

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            const toggleDarkMode = () => setDarkMode(prev => !prev);

            useEffect(() => {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = BASE_PATH + '/login.html';
                    return;
                }
                const storedUsername = localStorage.getItem('username');
                if (storedUsername) setUsername(storedUsername);
                fetchRCV();
            }, []);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, dateStart, filtroFila, filtroEtapa]);

            const showToast = useCallback((message, type = 'success') => setToast({ message, type }), []);

            const fetchRCV = useCallback(async () => {
                try {
                    setLoading(true);
                    const token = localStorage.getItem('token');
                    const params = new URLSearchParams();
                    if (searchTerm) params.append('search', searchTerm);
                    if (dateStart) params.append('dateStart', dateStart);
                    if (filtroFila) params.append('fila', filtroFila);
                    if (filtroEtapa) params.append('etapa', filtroEtapa);
                    
                    const response = await fetch(`${BASE_PATH}/api/rcv?${params}`, { 
                        headers: { 'Authorization': `Bearer ${token}` } 
                    });
                    
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('username');
                        window.location.href = BASE_PATH + '/login.html';
                        return;
                    }
                    
                    const data = await response.json();
                    setRcvList(data);
                } catch (error) {
                    console.error('Erro ao buscar RCV:', error);
                    showToast('Erro ao carregar RCV', 'error');
                } finally {
                    setLoading(false);
                }
            }, [searchTerm, dateStart, filtroFila, filtroEtapa, BASE_PATH, showToast]);

            useEffect(() => {
                const timer = setTimeout(fetchRCV, 300);
                return () => clearTimeout(timer);
            }, [fetchRCV]);

            const handleLogout = useCallback(() => {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                window.location.href = BASE_PATH + '/login.html';
            }, [BASE_PATH]);

            const formatDate = (dateString) => {
                if (!dateString || dateString === '-' || dateString === 'null') return '-';
                return dateString;
            };

            // Filtro local para complementar
            const filteredRCV = rcvList.filter(() => true);

            const indexOfLastItem = currentPage * itemsPerPage;
            const indexOfFirstItem = indexOfLastItem - itemsPerPage;
            const currentItems = filteredRCV.slice(indexOfFirstItem, indexOfLastItem);
            const totalPages = Math.ceil(filteredRCV.length / itemsPerPage);

            // Skeleton
            const SkeletonRow = () => React.createElement('tr', { className: "animate-pulse" },
                React.createElement('td', { className: "px-4 py-3" }, React.createElement('div', { className: "h-4 bg-slate-200 rounded w-24" })),
                React.createElement('td', { className: "px-4 py-3" }, React.createElement('div', { className: "h-4 bg-slate-200 rounded w-32" })),
                React.createElement('td', { className: "px-4 py-3" }, React.createElement('div', { className: "h-4 bg-slate-200 rounded w-36" })),
                React.createElement('td', { className: "px-4 py-3" }, React.createElement('div', { className: "h-8 w-8 bg-slate-200 rounded-lg" }))
            );

            // Extrair filas únicas para o filtro
            const filasUnicas = [...new Set(rcvList.map(r => r.fila).filter(Boolean))].sort();
            const etapasUnicas = [...new Set(rcvList.map(r => r.etapa).filter(Boolean))].sort();

            return React.createElement('div', { className: "min-h-screen bg-slate-50/80" },
                // Header
                React.createElement('header', { className: "bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" },
                        React.createElement('div', { className: "flex justify-between items-center h-16" },
                            React.createElement('div', { className: "flex items-center gap-3" },
                                React.createElement('div', { className: "w-10 h-10 bg-gradient-to-br from-cyan-600 to-blue-700 rounded-xl flex items-center justify-center shadow-md" },
                                    React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", className: "h-5 w-5 text-white", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: 2 },
                                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" })
                                    )
                                ),
                                React.createElement('div', null,
                                    React.createElement('h1', { className: "text-xl font-bold text-slate-800" }, 'RCV - Réplica'),
                                    React.createElement('p', { className: "text-xs text-slate-500" }, 'Controle de réplicas de cotações')
                                )
                            ),
                            React.createElement('div', { className: "flex items-center gap-4" },
                                React.createElement('button', {
                                    onClick: toggleDarkMode,
                                    className: `p-2 rounded-lg transition-all duration-200 hover:scale-110 ${
                                        darkMode 
                                            ? 'text-amber-400 bg-slate-700 hover:bg-slate-600' 
                                            : 'text-slate-600 bg-slate-100 hover:bg-slate-200'
                                    }`
                                }, darkMode ? React.createElement(SunIcon) : React.createElement(MoonIcon)),
                                React.createElement('div', { className: "hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-full shadow-sm" },
                                    React.createElement('div', { className: "w-7 h-7 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-full flex items-center justify-center text-white shadow-sm" },
                                        React.createElement(UserIcon)
                                    ),
                                    React.createElement('span', { className: "text-sm font-semibold text-white" }, username)
                                ),
                                React.createElement('button', { onClick: handleLogout, className: "flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors duration-200" },
                                    React.createElement(LogoutIcon),

                    )
                ),
