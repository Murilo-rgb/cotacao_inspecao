        html.dark .shadow-sm, html.dark .shadow-md, html.dark .shadow-lg, html.dark .shadow-xl, html.dark .shadow-2xl {

        html.dark .bg-amber-50 { background-color: rgba(217, 119, 6, 0.15) !important; }
        html.dark .text-amber-700 { color: #fbbf24 !important; }
        html.dark .border-amber-200 { border-color: rgba(217, 119, 6, 0.3) !important; }
        html.dark .bg-violet-50 { background-color: rgba(139, 92, 246, 0.15) !important; }
        html.dark .text-violet-700 { color: #a78bfa !important; }
        html.dark .border-violet-200 { border-color: rgba(139, 92, 246, 0.3) !important; }
        html.dark .bg-indigo-100 { background-color: rgba(99, 102, 241, 0.15) !important; }
        html.dark .bg-blue-50 { background-color: rgba(59, 130, 246, 0.15) !important; }
        html.dark .bg-orange-50 { background-color: rgba(249, 115, 22, 0.15) !important; }
        html.dark .modal-content { background-color: #1e293b !important; }
        html.dark .skeleton, html.dark .animate-pulse div { background-color: #334155 !important; }
        html.dark .bg-gradient-to-r { opacity: 0.9; }
        html.dark .bg-emerald-50\/30 { background-color: rgba(5, 150, 105, 0.08) !important; }

        if (saved === 'true') {
            document.documentElement.classList.add('dark');
        }
    })();

            React.createElement('polyline', { points: "23 4 23 10 17 10" }),
            React.createElement('path', { d: "M20.49 15a9 9 0 1 1-2.12-9.36L23 10" })
        );

            React.createElement('path', { d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }),
            React.createElement('polyline', { points: "14 2 14 8 20 8" })
        );

        // --- SUBCOMPONENTE TOAST (Corrigido: Movido para fora do App) ---
        const Toast = ({ toast }) => {
            if (!toast) return null;
            return React.createElement('div', {
                className: `fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-slideUp ${
                    toast.type === 'success' ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'
                }`
            },
                toast.type === 'success' ? React.createElement(CheckIcon) : React.createElement(AlertIcon),
                React.createElement('span', { className: 'font-medium text-sm' }, toast.message)
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        // Dark mode icons
        const SunIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('circle', { cx: "12", cy: "12", r: "5" }),
            React.createElement('line', { x1: "12", y1: "1", x2: "12", y2: "3" }),
            React.createElement('line', { x1: "12", y1: "21", x2: "12", y2: "23" }),
            React.createElement('line', { x1: "4.22", y1: "4.22", x2: "5.64", y2: "5.64" }),
            React.createElement('line', { x1: "18.36", y1: "18.36", x2: "19.78", y2: "19.78" }),
            React.createElement('line', { x1: "1", y1: "12", x2: "3", y2: "12" }),
            React.createElement('line', { x1: "21", y1: "12", x2: "23", y2: "12" }),
            React.createElement('line', { x1: "4.22", y1: "19.78", x2: "5.64", y2: "18.36" }),
            React.createElement('line', { x1: "18.36", y1: "5.64", x2: "19.78", y2: "4.22" })
        );
        const MoonIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" })
        );

        function App() {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [username, setUsername] = useState(localStorage.getItem('username') || '');
            const [tarefas, setTarefas] = useState([]);
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [dragActive, setDragActive] = useState(false);
            const [fileInfo, setFileInfo] = useState(null);
            const [toast, setToast] = useState(null);
            const [stats, setStats] = useState({ total: 0 });
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('darkMode');
                return saved === 'true';
            });
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            const toggleDarkMode = () => setDarkMode(prev => !prev);

            const getBasePath = () => window.location.pathname.startsWith('/pme_notas') ? '/pme_notas' : '';

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            useEffect(() => {
                const t = localStorage.getItem('token');
                if (!t) {
                    window.location.href = getBasePath() + '/login.html';
                    return;
                }
                setToken(t);
                const storedUser = localStorage.getItem('username');
                if (storedUser) setUsername(storedUser);
            }, []);

            const fetchTarefas = useCallback(async () => {
                if (!token) return;
                try {
                    setLoading(true);
                    const res = await fetch(`${getBasePath()}/api/gestao_input/tarefas`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401 || res.status === 403) {
                        localStorage.removeItem('token');
                        window.location.href = getBasePath() + '/login.html';
                        return;
                    }
                    const data = await res.json();
                    setTarefas(data.data || []);
                    setStats({ total: data.total || 0 });
                } catch (err) {
                    console.error('Erro ao buscar dados:', err);
                    showToast('Erro ao carregar dados', 'error');
                } finally {
                    setLoading(false);
                }
            }, [token]);

            useEffect(() => {
                if (token) {
                    fetchTarefas();
                }
            }, [token, fetchTarefas]);

            const handleUpload = async (file) => {
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext !== 'csv' && ext !== 'zip') {
                    showToast('Apenas arquivos .csv ou .zip são permitidos', 'error');
                    return;
                }

                setFileInfo({ name: file.name, size: (file.size / 1024 / 1024).toFixed(2) + ' MB' });
                setUploading(true);

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch(`${getBasePath()}/api/gestao_input/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message || 'Arquivo processado com sucesso!', 'success');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao processar arquivo', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao enviar arquivo: ' + err.message, 'error');
                } finally {
                    setUploading(false);
                }
            };

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') {
                    setDragActive(true);
                } else if (e.type === 'dragleave') {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleUpload(e.dataTransfer.files[0]);
                }
            };

            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files[0]) {
                    handleUpload(e.target.files[0]);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                window.location.href = getBasePath() + '/login.html';
            };

            const formatDate = (dateStr) => {
                if (!dateStr || dateStr === '-') return '-';
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    return d.toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch { return dateStr; }
            };

            const [filters, setFilters] = useState({
                fila: '',
                codigo_da_tarefa: '',
                razao_social_cliente: '',
                situacao_sistema: ''
            });

            const updateFilter = (key, value) => {
                setFilters(prev => ({ ...prev, [key]: value }));
            };

            const matches = (val, filter) => {
                if (!filter) return true;
                try {
                    return String(val || '').toLowerCase().includes(String(filter).toLowerCase());
                } catch { return false; }
            };

            const filteredTarefas = tarefas.filter(t => {
                if (!(
                    matches(t.fila, filters.fila) &&
                    matches(t.codigo_da_tarefa, filters.codigo_da_tarefa) &&
                    matches(t.razao_social_cliente, filters.razao_social_cliente) &&
                    matches(t.situacao_sistema, filters.situacao_sistema)
                )) return false;
                return true;
            });

            return React.createElement('div', { className: 'min-h-screen bg-slate-50/80' },
                React.createElement('header', { className: 'bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
                        React.createElement('div', { className: 'flex justify-between items-center h-16' },
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('div', { className: 'w-10 h-10 bg-gradient-to-br from-violet-600 to-purple-700 rounded-xl flex items-center justify-center shadow-md' },
                                    React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", className: "h-5 w-5 text-white", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor", strokeWidth: "2" },
                                        React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M9 5H7a2 2 0 002 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 002-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" })
                                    )
                                ),
                                React.createElement('div', null,
                                    React.createElement('h1', { className: 'text-xl font-bold text-slate-800' }, 'Gestão Input - IW_CPC_975'),
                                    React.createElement('p', { className: 'text-xs text-slate-500' }, 'Upload e visualização de dados Input')
                                )
                            ),
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('button', {
                                    onClick: toggleDarkMode,
                                    className: `p-2 rounded-lg transition-all duration-200 hover:scale-110 ${
                                        darkMode 
                                            ? 'text-amber-400 bg-slate-700 hover:bg-slate-600' 
                                            : 'text-slate-600 bg-slate-100 hover:bg-slate-200'
                                    }`
                                }, darkMode ? React.createElement(SunIcon) : React.createElement(MoonIcon)),
                                React.createElement('button', {
                                    onClick: handleLogout,
                                    className: 'flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors duration-200'
                                },
                                    React.createElement(LogoutIcon),
                                    React.createElement('span', { className: 'hidden sm:inline' }, 'Sair')
                                )
                            )
                        )
                    )
                ),

                React.createElement('main', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8' },
                    React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6' },
                        React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                            React.createElement('p', { className: 'text-sm font-medium text-slate-500' }, 'Total de Registros'),
                            React.createElement('p', { className: 'text-2xl font-bold text-slate-800 mt-1' }, stats.total)
                        ),
                        React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                            React.createElement('p', { className: 'text-sm font-medium text-blue-600' }, 'Registros na Tela'),
                            React.createElement('p', { className: 'text-2xl font-bold text-blue-700 mt-1' }, filteredTarefas.length)
                        )
                    ),

                    React.createElement('div', { className: 'bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6' },
                        React.createElement('h2', { className: 'text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2' },
                            React.createElement(UploadIcon),
                            'Upload do Arquivo IW_CPC_975'
                        ),
                        React.createElement('div', {
                            className: `dropzone relative rounded-xl p-8 text-center cursor-pointer ${dragActive ? 'active' : ''} ${fileInfo ? 'has-file' : ''}`,
                            onDragEnter: handleDrag,
                            onDragLeave: handleDrag,
                            onDragOver: handleDrag,
                            onDrop: handleDrop,
                            onClick: () => fileInputRef.current?.click()
                        },
                            React.createElement('input', {
                                ref: fileInputRef,
                                type: 'file',
                                accept: '.csv,.zip',
                                className: 'hidden',
                                onChange: handleFileSelect
                            }),
                            uploading
                                ? React.createElement('div', { className: 'flex flex-col items-center gap-3' },
                                    React.createElement('div', { className: 'w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin' }),
                                    React.createElement('p', { className: 'text-sm font-medium text-blue-600' }, 'Processando arquivo...')
                                  )
                                : fileInfo
                                    ? React.createElement('div', { className: 'flex flex-col items-center gap-2' },
                                        React.createElement(FileIcon),
                                        React.createElement('p', { className: 'text-sm font-medium text-emerald-700' }, fileInfo.name),
                                        React.createElement('p', { className: 'text-xs text-emerald-500' }, fileInfo.size),
                                        React.createElement('p', { className: 'text-xs text-slate-400 mt-1' }, 'Clique ou arraste para trocar o arquivo')
                                      )
                                    : React.createElement('div', { className: 'flex flex-col items-center gap-3' },
                                        React.createElement('div', { className: 'w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-400' },
                                            React.createElement(UploadIcon)
                                        ),
                                        React.createElement('div', null,
                                            React.createElement('p', { className: 'text-sm font-medium text-slate-700' },
                                                'Arraste o arquivo .csv ou .zip aqui, ou ',
                                                React.createElement('span', { className: 'text-blue-600 underline' }, 'clique para selecionar')
                                            ),
                                            React.createElement('p', { className: 'text-xs text-slate-400 mt-1' }, 'O arquivo deve conter os dados do relatório 975')
                                        )
                                      )
                        )
                    ),

                    React.createElement('div', { className: 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden' },
                        React.createElement('div', { className: 'flex items-center justify-between px-6 py-4 border-b border-slate-200' },
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('h2', { className: 'text-lg font-semibold text-slate-800' }, 'Dados Input - Etapa 04'),
                                !loading && React.createElement('span', { className: 'text-xs px-2 py-1 bg-slate-100 text-slate-500 rounded-full font-medium' },
                                    `${filteredTarefas.length} / ${tarefas.length} registros`
                                )
                            ),
                            React.createElement('div', { className: 'flex items-center gap-2' },
                                React.createElement('a', {
                                    href: `${getBasePath()}/gestao`,
                                    className: 'px-3 py-2 text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors'
                                }, 'Voltar'),
                                React.createElement('button', {
                                    onClick: fetchTarefas,
                                    disabled: loading,
                                    className: 'p-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-colors duration-200 disabled:opacity-50'
                                },
                                    React.createElement(RefreshIcon)
                                )
                            )
                        ),

                        React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-4 gap-4 px-6 py-4 bg-slate-50 border-b border-slate-200' },
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-xs font-medium text-slate-600 mb-1' }, 'Fila'),
                                React.createElement('input', {
                                    value: filters.fila,
                                    onChange: (e) => updateFilter('fila', e.target.value),
                                    placeholder: 'Filtrar...',
                                    className: 'w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500'
                                })
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-xs font-medium text-slate-600 mb-1' }, 'Tarefa'),
                                React.createElement('input', {
                                    value: filters.codigo_da_tarefa,
                                    onChange: (e) => updateFilter('codigo_da_tarefa', e.target.value),
                                    placeholder: 'Filtrar...',
                                    className: 'w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500'
                                })
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-xs font-medium text-slate-600 mb-1' }, 'Cliente'),
                                React.createElement('input', {
                                    value: filters.razao_social_cliente,
                                    onChange: (e) => updateFilter('razao_social_cliente', e.target.value),
                                    placeholder: 'Filtrar...',
                                    className: 'w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500'
                                })
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-xs font-medium text-slate-600 mb-1' }, 'Situação'),
                                React.createElement('input', {
                                    value: filters.situacao_sistema,
                                    onChange: (e) => updateFilter('situacao_sistema', e.target.value),
                                    placeholder: 'Filtrar...',
                                    className: 'w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-violet-500/20 focus:border-violet-500'
                                })
                            )
                        ),

                        loading
                            ? React.createElement('div', { className: 'p-12 text-center' },
                                React.createElement('div', { className: 'w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4' }),
                                React.createElement('p', { className: 'text-sm text-slate-500' }, 'Carregando dados...')
                              )
                            : tarefas.length === 0
                                ? React.createElement('div', { className: 'p-12 text-center' },
                                    React.createElement('div', { className: 'inline-flex items-center justify-center w-16 h-16 bg-slate-100 rounded-2xl text-slate-400 mb-4' },
                                        React.createElement(FileIcon)
                                    ),
                                    React.createElement('h3', { className: 'text-lg font-semibold text-slate-800 mb-1' }, 'Nenhum registro encontrado'),
                                    React.createElement('p', { className: 'text-slate-500 text-sm' }, 'Faça o upload do arquivo IW_CPC_975 para começar.')
                                  )
                                : React.createElement('div', { className: 'overflow-x-auto' },
                                    React.createElement('table', { className: 'min-w-full divide-y divide-slate-200' },
                                        React.createElement('thead', { className: 'bg-slate-50' },
                                            React.createElement('tr', null,
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Fila'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Tarefa'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Data Histórico'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Etapa'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Ação'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Cliente'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Situação')
                                            )
                                        ),
                                        React.createElement('tbody', { className: 'bg-white divide-y divide-slate-100' },
                                            // Corrigido: chave única concatenando o index do map para prevenir problemas com tarefas duplicadas
                                            filteredTarefas.slice(0, 100).map((tarefa, index) =>
                                                React.createElement('tr', {
                                                    key: `${tarefa.codigo_da_tarefa || 'tarefa'}-${index}`,
                                                    className: 'hover:bg-slate-50/80 transition-colors duration-150'
                                                },
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm text-slate-700' }, tarefa.fila || '-')
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm font-semibold text-slate-900 font-mono bg-slate-100 px-2 py-1 rounded-md' },
                                                            tarefa.codigo_da_tarefa || '-'
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm text-slate-600' },
                                                            formatDate(tarefa.data_historico)
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm text-slate-700' },
                                                            tarefa.para_etapa || tarefa.etapa_atual || '-'
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm text-slate-700' },
                                                            tarefa.acao || '-'
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm text-slate-700' },
                                                            tarefa.razao_social_cliente || '-'
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm font-medium text-slate-700' },
                                                            tarefa.situacao_sistema || '-'
                                                        )
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                    ),

                    React.createElement(Toast, { toast })
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
