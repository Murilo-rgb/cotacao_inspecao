<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Dashboard - Distribuição de cotações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useCallback } = React;

        // ============== ICONES ==============
        const ChartIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('line', { x1: "18", y1: "20", x2: "18", y2: "10" }),
            React.createElement('line', { x1: "12", y1: "20", x2: "12", y2: "4" }),
            React.createElement('line', { x1: "6", y1: "20", x2: "6", y2: "14" })
        );
        const ClockIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('circle', { cx: "12", cy: "12", r: "10" }),
            React.createElement('polyline', { points: "12 6 12 12 16 14" })
        );
        const UsersIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" }),
            React.createElement('circle', { cx: "9", cy: "7", r: "4" }),
            React.createElement('path', { d: "M23 21v-2a4 4 0 0 0-3-3.87" }),
            React.createElement('path', { d: "M16 3.13a4 4 0 0 1 0 7.75" })
        );
        const RefreshIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('polyline', { points: "23 4 23 10 17 10" }),
            React.createElement('path', { d: "M20.49 15a9 9 0 1 1-2.12-9.36L23 10" })
        );
        const HistoryIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('circle', { cx: "12", cy: "12", r: "10" }),
            React.createElement('polyline', { points: "12 6 12 12 16 14" })
        );

        function App() {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [username, setUsername] = useState(localStorage.getItem('username') || '');
            const [colaboradores, setColaboradores] = useState([]);
            const [historico, setHistorico] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard' | 'historico'
            const [filtroTarefa, setFiltroTarefa] = useState('');
            const [filtroDataDashboard, setFiltroDataDashboard] = useState('');

            const getBasePath = () => window.location.pathname.startsWith('/pme_notas') ? '/pme_notas' : '';

            const fetchDashboard = useCallback(async () => {
                if (!token) return;
                try {
                    setLoading(true);
                    const params = new URLSearchParams();
                    if (filtroDataDashboard) {
                        // Converter YYYY-MM-DD para DD/MM/YYYY
                        const [year, month, day] = filtroDataDashboard.split('-');
                        params.set('data', `${day}/${month}/${year}`);
                    }
                    const queryStr = params.toString() ? `?${params.toString()}` : '';
                    const res = await fetch(`${getBasePath()}/api/gestao/dashboard${queryStr}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401 || res.status === 403) {
                        localStorage.removeItem('token');
                        window.location.href = getBasePath() + '/login.html';
                        return;
                    }
                    const data = await res.json();
                    setColaboradores(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error('[DASHBOARD] Erro:', err);
                    setColaboradores([]);
                } finally {
                    setLoading(false);
                }
            }, [token, filtroDataDashboard]);

            const fetchHistorico = useCallback(async () => {
                if (!token) return;
                try {
                    const params = new URLSearchParams({ limit: 200 });
                    if (filtroTarefa) params.set('tarefa', filtroTarefa);
                    const res = await fetch(`${getBasePath()}/api/gestao/historico?${params}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setHistorico(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error('[HISTORICO] Erro:', err);
                    setHistorico([]);
                }
            }, [token, filtroTarefa]);

            useEffect(() => {
                const t = localStorage.getItem('token');
                if (!t) {
                    window.location.href = getBasePath() + '/login.html';
                    return;
                }
                setToken(t);
                const storedUser = localStorage.getItem('username');
                if (storedUser) setUsername(storedUser);
            }, []);

            useEffect(() => {
                if (token) {
                    fetchDashboard();
                    fetchHistorico();
                }
            }, [token, fetchDashboard, fetchHistorico]);

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    return d.toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch { return dateStr; }
            };

            const getStatusColor = (status) => {
                switch ((status || '').toLowerCase()) {
                    case 'aprovado': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                    case 'reprovado': return 'bg-red-100 text-red-700 border-red-200';
                    case 'pendente': return 'bg-amber-100 text-amber-700 border-amber-200';
                    default: return 'bg-slate-100 text-slate-600 border-slate-200';
                }
            };

            const getAcaoColor = (acao) => {
                switch (acao) {
                    case 'distribuido': return 'bg-blue-100 text-blue-700 border-blue-200';
                    case 'redistribuido': return 'bg-amber-100 text-amber-700 border-amber-200';
                    case 'status_alterado': return 'bg-purple-100 text-purple-700 border-purple-200';
                    default: return 'bg-slate-100 text-slate-600 border-slate-200';
                }
            };

            const totalPendentes = colaboradores.reduce((s, c) => s + (c.pendentes || 0), 0);
            const totalAprovados = colaboradores.reduce((s, c) => s + (c.aprovados || 0), 0);
            const totalReprovados = colaboradores.reduce((s, c) => s + (c.reprovados || 0), 0);
            const totalGeral = colaboradores.reduce((s, c) => s + (c.total || 0), 0);

            return React.createElement('div', { className: 'min-h-screen bg-slate-50/80' },
                // Header
                React.createElement('header', { className: 'bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
                        React.createElement('div', { className: 'flex justify-between items-center h-16' },
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('div', { className: 'w-10 h-10 bg-gradient-to-br from-emerald-600 to-teal-700 rounded-xl flex items-center justify-center shadow-md' },
                                    React.createElement(ChartIcon)
                                ),
                                React.createElement('div', null,
                                    React.createElement('h1', { className: 'text-xl font-bold text-slate-800' }, 'Dashboard de Distribuição'),
                                    React.createElement('p', { className: 'text-xs text-slate-500' }, 'SLA e produtividade dos colaboradores')
                                )
                            ),
                            React.createElement('div', { className: 'flex items-center gap-3' },
                                React.createElement('a', {
                                    href: `${getBasePath()}/gestao`,
                                    className: 'text-xs text-slate-500 hover:text-violet-600 underline'
                                }, '← Voltar para Gestão'),
                                React.createElement('div', { className: 'hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-full shadow-sm' },
                                    React.createElement('span', { className: 'text-sm font-semibold text-white' }, username)
                                )
                            )
                        )
                    )
                ),

                React.createElement('main', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8' },
                    // Tabs
                    React.createElement('div', { className: 'flex items-center gap-4 mb-6 border-b border-slate-200 pb-2' },
                        React.createElement('button', {
                            onClick: () => setActiveTab('dashboard'),
                            className: `px-4 py-2 text-sm font-medium rounded-t-lg transition-colors ${
                                activeTab === 'dashboard'
                                    ? 'text-emerald-700 border-b-2 border-emerald-600 bg-emerald-50'
                                    : 'text-slate-500 hover:text-slate-700'
                            }`
                        },
                            React.createElement('span', { className: 'flex items-center gap-2' },
                                React.createElement(ChartIcon),
                                'Dashboard'
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => setActiveTab('historico'),
                            className: `px-4 py-2 text-sm font-medium rounded-t-lg transition-colors ${
                                activeTab === 'historico'
                                    ? 'text-emerald-700 border-b-2 border-emerald-600 bg-emerald-50'
                                    : 'text-slate-500 hover:text-slate-700'
                            }`
                        },
                            React.createElement('span', { className: 'flex items-center gap-2' },
                                React.createElement(HistoryIcon),
                                'Histórico'
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => { fetchDashboard(); fetchHistorico(); },
                            className: 'ml-auto p-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-colors'
                        },
                            React.createElement(RefreshIcon)
                        )
                    ),

                    // Tab: Dashboard
                    activeTab === 'dashboard' && React.createElement('div', { className: 'animate-fadeIn' },
                        // Filtro por data
                        React.createElement('div', { className: 'flex items-center gap-3 mb-4' },
                            React.createElement('label', { className: 'text-sm font-medium text-slate-600' }, 'Filtrar por data:'),
                            React.createElement('input', {
                                type: 'date',
                                value: filtroDataDashboard,
                                onChange: (e) => setFiltroDataDashboard(e.target.value),
                                className: 'px-3 py-2 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500'
                            }),
                            filtroDataDashboard && React.createElement('button', {
                                onClick: () => setFiltroDataDashboard(''),
                                className: 'px-3 py-2 text-xs font-medium text-slate-600 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors'
                            }, 'Limpar')
                        ),

                        // Stats Cards
                        React.createElement('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6' },
                            React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                                React.createElement('p', { className: 'text-sm font-medium text-slate-500' }, 'Total Distribuído'),
                                React.createElement('p', { className: 'text-2xl font-bold text-slate-800 mt-1' }, totalGeral)
                            ),
                            React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                                React.createElement('p', { className: 'text-sm font-medium text-amber-600' }, 'Pendentes'),
                                React.createElement('p', { className: 'text-2xl font-bold text-amber-700 mt-1' }, totalPendentes)
                            ),
                            React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                                React.createElement('p', { className: 'text-sm font-medium text-emerald-600' }, 'Aprovados'),
                                React.createElement('p', { className: 'text-2xl font-bold text-emerald-700 mt-1' }, totalAprovados)
                            ),
                            React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                                React.createElement('p', { className: 'text-sm font-medium text-red-600' }, 'Reprovados'),
                                React.createElement('p', { className: 'text-2xl font-bold text-red-700 mt-1' }, totalReprovados)
                            ),
                            React.createElement('div', { className: 'bg-white rounded-xl p-4 border border-slate-200 shadow-sm' },
                                React.createElement('p', { className: 'text-sm font-medium text-indigo-600' }, 'Tratados'),
                                React.createElement('p', { className: 'text-2xl font-bold text-indigo-700 mt-1' }, totalAprovados + totalReprovados)
                            )
                        ),

                        // Tabela de colaboradores
                        loading
                            ? React.createElement('div', { className: 'p-12 text-center' },
                                React.createElement('div', { className: 'w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4' }),
                                React.createElement('p', { className: 'text-sm text-slate-500' }, 'Carregando dashboard...')
                              )
                            : React.createElement('div', { className: 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden' },
                                React.createElement('div', { className: 'px-6 py-4 border-b border-slate-200' },
                                    React.createElement('h2', { className: 'text-lg font-semibold text-slate-800 flex items-center gap-2' },
                                        React.createElement(UsersIcon),
                                        'Produtividade por Colaborador'
                                    )
                                ),
                                React.createElement('div', { className: 'overflow-x-auto' },
                                    React.createElement('table', { className: 'min-w-full divide-y divide-slate-200' },
                                        React.createElement('thead', { className: 'bg-slate-50' },
                                            React.createElement('tr', null,
                                                React.createElement('th', { className: 'px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Colaborador'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-amber-600 uppercase tracking-wider' }, 'Pendente'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-emerald-600 uppercase tracking-wider' }, 'Aprovado'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-red-600 uppercase tracking-wider' }, 'Reprovado'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Total'),
                                                React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'SLA Médio')
                                            )
                                        ),
                                        React.createElement('tbody', { className: 'bg-white divide-y divide-slate-100' },
                                            colaboradores.length === 0
                                                ? React.createElement('tr', null,
                                                    React.createElement('td', { colSpan: 6, className: 'px-6 py-8 text-center text-sm text-slate-400' },
                                                        'Nenhum dado disponível'
                                                    )
                                                  )
                                                : colaboradores.map(col =>
                                                    React.createElement('tr', {
                                                        key: col.usuario_id,
                                                        className: `hover:bg-slate-50/80 transition-colors ${col.pendentes === 0 ? 'bg-emerald-50/20' : ''}`
                                                    },
                                                        React.createElement('td', { className: 'px-6 py-4 whitespace-nowrap' },
                                                            React.createElement('div', { className: 'flex items-center gap-2' },
                                                                col.pendentes === 0 && React.createElement('span', { className: 'text-lg', title: 'Disponível' }, '🟢'),
                                                                React.createElement('div', null,
                                                                    React.createElement('p', { className: `text-sm font-semibold ${col.pendentes === 0 ? 'text-emerald-700' : 'text-slate-900'}` }, col.usuario_nome),
                                                                    React.createElement('p', { className: 'text-xs text-slate-400' }, col.usuario_login)
                                                                )
                                                            )
                                                        ),
                                                        React.createElement('td', { className: 'px-4 py-4 whitespace-nowrap text-center' },
                                                            React.createElement('span', { className: 'text-sm font-bold text-amber-600' }, col.pendentes)
                                                        ),
                                                        React.createElement('td', { className: 'px-4 py-4 whitespace-nowrap text-center' },
                                                            React.createElement('span', { className: 'text-sm font-bold text-emerald-600' }, col.aprovados)
                                                        ),
                                                        React.createElement('td', { className: 'px-4 py-4 whitespace-nowrap text-center' },
                                                            React.createElement('span', { className: 'text-sm font-bold text-red-600' }, col.reprovados)
                                                        ),
                                                        React.createElement('td', { className: 'px-4 py-4 whitespace-nowrap text-center' },
                                                            React.createElement('span', { className: 'text-sm font-bold text-slate-700' }, col.total)
                                                        ),
                                                        React.createElement('td', { className: 'px-4 py-4 whitespace-nowrap text-center' },
                                                            React.createElement('span', { className: 'text-sm font-medium text-slate-600' }, col.sla_medio)
                                                        )
                                                    )
                                                  )
                                        )
                                    )
                                )
                              )
                    ),

                    // Tab: Histórico
                    activeTab === 'historico' && React.createElement('div', { className: 'animate-fadeIn' },
                        React.createElement('div', { className: 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden' },
                            React.createElement('div', { className: 'px-6 py-4 border-b border-slate-200 flex items-center justify-between' },
                                React.createElement('h2', { className: 'text-lg font-semibold text-slate-800 flex items-center gap-2' },
                                    React.createElement(HistoryIcon),
                                    'Histórico de Movimentações'
                                ),
                                React.createElement('div', { className: 'flex items-center gap-2' },
                                    React.createElement('input', {
                                        value: filtroTarefa,
                                        onChange: (e) => setFiltroTarefa(e.target.value),
                                        placeholder: 'Filtrar por tarefa...',
                                        className: 'w-40 px-3 py-1.5 text-xs border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500'
                                    }),
                                    React.createElement('button', {
                                        onClick: fetchHistorico,
                                        className: 'px-3 py-1.5 text-xs font-medium bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-colors'
                                    }, 'Buscar')
                                )
                            ),
                            React.createElement('div', { className: 'overflow-x-auto' },
                                React.createElement('table', { className: 'min-w-full divide-y divide-slate-200' },
                                    React.createElement('thead', { className: 'bg-slate-50' },
                                        React.createElement('tr', null,
                                            React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Data/Hora'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Tarefa'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Ação'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'De'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Para'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Status Anterior'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Status Novo'),
                                            React.createElement('th', { className: 'px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider' }, 'Realizado por')
                                        )
                                    ),
                                    React.createElement('tbody', { className: 'bg-white divide-y divide-slate-100' },
                                        historico.length === 0
                                            ? React.createElement('tr', null,
                                                React.createElement('td', { colSpan: 8, className: 'px-6 py-8 text-center text-sm text-slate-400' },
                                                    'Nenhuma movimentação registrada ainda'
                                                )
                                              )
                                            : historico.map(h =>
                                                React.createElement('tr', {
                                                    key: h.id,
                                                    className: 'hover:bg-slate-50/80 transition-colors'
                                                },
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap text-xs text-slate-500' },
                                                        formatDate(h.data)
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: 'text-sm font-mono font-semibold text-slate-900' }, h.tarefa)
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap' },
                                                        React.createElement('span', { className: `inline-block px-2 py-0.5 text-xs font-semibold rounded-full border ${getAcaoColor(h.acao)}` },
                                                            h.acao
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap text-sm text-slate-600' },
                                                        h.usuario_origem
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap text-sm text-slate-600' },
                                                        h.usuario_destino
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap text-center' },
                                                        React.createElement('span', { className: `inline-block px-2 py-0.5 text-xs font-medium rounded-full border ${getStatusColor(h.status_anterior)}` },
                                                            h.status_anterior
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap text-center' },
                                                        React.createElement('span', { className: `inline-block px-2 py-0.5 text-xs font-medium rounded-full border ${getStatusColor(h.status_novo)}` },
                                                            h.status_novo
                                                        )
                                                    ),
                                                    React.createElement('td', { className: 'px-4 py-3 whitespace-nowrap text-sm text-slate-500' },
                                                        h.criado_por
                                                    )
                                                )
                                              )
                                    )
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
