<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devolução Padrão Inspeção PME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header p {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.85;
        }

        /* --- BARRA DE PESQUISA --- */
        .search-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 40px;
            background: #f8f7ff;
            border-bottom: 1px solid #e8e8e8;
            flex-wrap: wrap;
        }

        .search-bar label {
            font-weight: 600;
            color: #4a3780;
            font-size: 15px;
            white-space: nowrap;
        }

        .search-bar input[type="text"] {
            flex: 1;
            min-width: 200px;
            max-width: 450px;
            padding: 12px 16px;
            border: 2px solid #d4cdf0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .search-bar input[type="text"]:focus {
            border-color: #667eea;
        }

        .search-bar button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }

        .search-bar button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .search-bar button:active {
            transform: translateY(0);
        }

        #result-count {
            font-size: 13px;
            color: #888;
            margin-left: 8px;
        }

        /* --- TABELA --- */
        .table-wrapper {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 16px 20px;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        th:first-child {
            width: 35%;
        }

        th:last-child {
            width: 65%;
        }

        tbody tr {
            border-bottom: 1px solid #e8e8e8;
            transition: background-color 0.2s ease;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: #f5f3ff;
        }

        td {
            padding: 14px 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            vertical-align: top;
        }

        td.motivo {
            font-weight: 600;
            color: #4a3780;
        }

        td.reprova {
            color: #555;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #e8e8e8;
        }

        .footer span {
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .search-bar {
                padding: 16px;
                flex-direction: column;
            }

            .search-bar input[type="text"] {
                min-width: 100%;
                max-width: 100%;
            }

            .search-bar button {
                width: 100%;
            }

            .table-wrapper {
                padding: 16px;
            }

            th, td {
                padding: 10px 12px;
                font-size: 13px;
            }

            th:first-child {
                width: 40%;
            }

            th:last-child {
                width: 60%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Devolução Padrão Inspeção PME</h1>
            <p>Lista de motivos de reprova e suas descrições detalhadas</p>
        </div>

        <!-- BARRA DE PESQUISA -->
        <div class="search-bar">
            <label for="palavra-chave">Pesquise por uma palavra chave</label>
            <input type="text" id="palavra-chave" placeholder="Digite a palavra-chave..." />
            <button onclick="filtrarTabela()">Pesquisar</button>
            <span id="result-count"></span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>MOTIVO</th>
                        <th>REPROVA</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr><td colspan="2">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            Gerado automaticamente por <span>reprova_padrao_web.py</span> &mdash; Dados extraídos de <span>DEVOLUÇÃO PADRÃO INSPEÇÃO PME.xlsx</span>
        </div>
    </div>

    <script>
        const DASH_TOKEN = localStorage.getItem('token') || '';
        const pathBase = window.location.pathname;
        const API_BASE = pathBase.includes('/pme_notas/') ? '/pme_notas/api/reprovas' : '/api/reprovas';
        async function carregarReprovas(termo = '') {
            try {
                const url = termo ? `${API_BASE}?termo=${encodeURIComponent(termo)}` : API_BASE;
                const res = await fetch(url, {
                    headers: { Authorization: `Bearer ${DASH_TOKEN}` },
                    credentials: 'same-origin'
                });
                if (!res.ok) throw new Error('Falha ao carregar reprovas');
                const dados = await res.json();
                renderTabela(dados);
                const countEl = document.getElementById('result-count');
                if (countEl) countEl.textContent = `${dados.length} registro(s)`;
            } catch (err) {
                document.getElementById('tabela-corpo').innerHTML = `<tr><td colspan="2">Erro: ${err.message}</td></tr>`;
                const countEl = document.getElementById('result-count');
                if (countEl) countEl.textContent = '';
            }
        }
        function renderTabela(dados) {
            const tbody = document.getElementById('tabela-corpo');
            if (!dados || dados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2">Nenhum registro encontrado</td></tr>';
                return;
            }
            tbody.innerHTML = dados.map(item => `
                <tr>
                    <td class="motivo">${item.motivo || ''}</td>
                    <td class="reprova">${item.texto_reprova || ''}</td>
                </tr>
            `).join('');
        }
        function filtrarTabela() {
            const termo = document.getElementById('palavra-chave').value.trim();
            carregarReprovas(termo);
        }
        document.addEventListener('DOMContentLoaded', () => {
            carregarReprovas();
        });
    </script>
</body>
</html>
