<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gerenciamento de cotações">
    <meta name="theme-color" content="#2563eb">
    <title>Cotações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .modal-overlay {
            animation: fadeIn 0.2s ease-out;
        }
        
        .modal-content {
            animation: scaleIn 0.3s ease-out;
        }
        
        .toast-enter {
            animation: slideUp 0.3s ease-out;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* ===== DARK MODE STYLES ===== */
        /* Smooth transition for all elements when toggling theme */
        html,
        html *,
        html *::before,
        html *::after {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Base dark mode - applied when .dark class is on <html> */
        html.dark {
            background-color: #0f172a;
        }

        html.dark body {
            background-color: #0f172a;
        }

        html.dark .bg-white {
            background-color: #1e293b !important;
        }

        html.dark .bg-slate-50,
        html.dark .bg-slate-50\/80 {
            background-color: #0f172a !important;
        }

        html.dark .bg-slate-100 {
            background-color: #1e293b !important;
        }

        html.dark .bg-slate-800 {
            background-color: #334155 !important;
        }

        html.dark .border-slate-200,
        html.dark .border-slate-300 {
            border-color: #334155 !important;
        }

        html.dark .border-slate-700 {
            border-color: #475569 !important;
        }

        html.dark .divide-slate-200 > *,
        html.dark .divide-slate-100 > * {
            border-color: #334155 !important;
        }

        html.dark .text-slate-500,
        html.dark .text-slate-400 {
            color: #94a3b8 !important;
        }

        html.dark .text-slate-600 {
            color: #cbd5e1 !important;
        }

        html.dark .text-slate-700 {
            color: #e2e8f0 !important;
        }

        html.dark .text-slate-800,
        html.dark .text-slate-900 {
            color: #f1f5f9 !important;
        }

        html.dark .text-white {
            color: #f8fafc !important;
        }

        html.dark .placeholder-slate-400::placeholder {
            color: #64748b !important;
        }

        /* Header specific */
        html.dark header {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        /* Table specific */
        html.dark table thead {
            background-color: #1e293b !important;
        }

        html.dark table thead th {
            color: #94a3b8 !important;
        }

        html.dark table tbody {
            background-color: #1e293b !important;
        }

        html.dark table tbody tr {
            background-color: #1e293b !important;
        }

        html.dark table tbody tr:hover {
            background-color: #334155 !important;
        }

        /* Inputs and selects */
        html.dark input,
        html.dark select,
        html.dark textarea {
            background-color: #1e293b !important;
            border-color: #475569 !important;
            color: #e2e8f0 !important;
        }

        html.dark input:focus,
        html.dark select:focus,
        html.dark textarea:focus {
            border-color: #8b5cf6 !important;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2) !important;
        }

        html.dark input:disabled,
        html.dark textarea:disabled,
        html.dark input[readonly],
        html.dark textarea[readonly] {
            background-color: #0f172a !important;
            color: #64748b !important;
        }

        html.dark .bg-slate-100 {
            background-color: #1e293b !important;
        }

        /* Shadow adjustments */
        html.dark .shadow-sm,
        html.dark .shadow-md,
        html.dark .shadow-lg,
        html.dark .shadow-xl,
        html.dark .shadow-2xl {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3) !important;
        }

        /* Status badges dark mode adjustments */
        html.dark .bg-emerald-50 {
            background-color: rgba(5, 150, 105, 0.15) !important;
        }
        html.dark .text-emerald-700 {
            color: #34d399 !important;
        }
        html.dark .border-emerald-200 {
            border-color: rgba(5, 150, 105, 0.3) !important;
        }

        html.dark .bg-red-50 {
            background-color: rgba(220, 38, 38, 0.15) !important;
        }
        html.dark .text-red-700 {
            color: #f87171 !important;
        }
        html.dark .border-red-200 {
            border-color: rgba(220, 38, 38, 0.3) !important;
        }

        html.dark .bg-amber-50 {
            background-color: rgba(217, 119, 6, 0.15) !important;
        }
        html.dark .text-amber-700 {
            color: #fbbf24 !important;
        }
        html.dark .border-amber-200 {
            border-color: rgba(217, 119, 6, 0.3) !important;
        }

        /* Modal adjustments */
        html.dark .modal-content {
            background-color: #1e293b !important;
        }

        /* Skeleton */
        html.dark .skeleton,
        html.dark .animate-pulse div {
            background-color: #334155 !important;
        }

        /* Button gradients */
        html.dark .bg-gradient-to-r {
            opacity: 0.9;
        }
    </style>
    <script>
    // Initialize dark mode from localStorage to prevent flash of unstyled content
    (function() {
        const saved = localStorage.getItem('darkMode');
        if (saved === 'true') {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script src="/pme_notas/dist/index.js?v=2"></script>
</body>
</html>
