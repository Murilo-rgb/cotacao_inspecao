<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cotações</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .modal-overlay {
            animation: fadeIn 0.2s ease-out;
        }
        
        .modal-content {
            animation: scaleIn 0.3s ease-out;
        }
        
        .toast-enter {
            animation: slideUp 0.3s ease-out;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons as SVG components
        const SearchIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </svg>
        );


        const PlusIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const EditIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        );

        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        );

        const HomeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        );

        const XIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const ClearIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        );

        const LoadingSpinner = () => (
            <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const ErrorIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const ChevronDownIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        // Main App Component
        function App() {
            const [quotations, setQuotations] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [editingQuotation, setEditingQuotation] = useState(null);
            const [formData, setFormData] = useState({ name: '', cotacao: '', anotacao: '' });
            const [loading, setLoading] = useState(false);
            const [submitting, setSubmitting] = useState(false);
            const [toast, setToast] = useState(null);
            const [initialLoading, setInitialLoading] = useState(true);
            const [statusModal, setStatusModal] = useState({ show: false, quotation: null });
            const [deleteModal, setDeleteModal] = useState({ show: false, cotacao: null });
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 10;

            useEffect(() => {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/login.html';
                    return;
                }
                const timer = setTimeout(() => {
                    fetchQuotations();
                }, 300);
                return () => clearTimeout(timer);
            }, [searchTerm]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm]);

            useEffect(() => {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/login.html';
                    return;
                }
                fetchQuotations();

                // Bloquear navegação com setas do navegador
                const handlePopState = (event) => {
                    const currentToken = localStorage.getItem('token');
                    if (!currentToken) {
                        window.location.href = '/login.html';
                    } else {
                        // Se houver token, impedir navegação de volta para login
                        window.history.pushState(null, '', window.location.href);
                    }
                };

                // Adicionar entrada ao histórico para impedir navegação de volta
                window.history.pushState(null, '', window.location.href);
                window.addEventListener('popstate', handlePopState);

                return () => {
                    window.removeEventListener('popstate', handlePopState);
                };
            }, []);

            const fetchQuotations = async () => {
                try {
                    setLoading(true);
                    const token = localStorage.getItem('token');
                    const params = new URLSearchParams();
                    if (searchTerm) params.append('search', searchTerm);
                    
                    const response = await fetch(`/api/quotations?${params}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('username');
                        window.location.href = '/login.html';
                        return;
                    }
                    
                    const data = await response.json();
                    setQuotations(data);
                    setInitialLoading(false);
                } catch (error) {
                    console.error('Erro ao buscar cotações:', error);
                    showToast('Erro ao buscar cotações', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const clearSearch = () => {
                setSearchTerm('');
            };

            const handleStatusClick = (quotation) => {
                setStatusModal({ show: true, quotation });
            };

            const handleStatusChange = async (newStatus) => {
                try {
                    setLoading(true);
                    const token = localStorage.getItem('token');
                    await fetch(`/api/quotations/${statusModal.quotation.cotacao}`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ status: newStatus })
                    });
                    showToast(`Status alterado para ${newStatus}!`, 'success');
                    setStatusModal({ show: false, quotation: null });
                    fetchQuotations();
                } catch (error) {
                    console.error('Erro ao alterar status:', error);
                    showToast('Erro ao alterar status', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleSearch = (e) => {
                setSearchTerm(e.target.value);
            };

            const handleAddClick = () => {
                setEditingQuotation(null);
                setFormData({ cotacao: '', anotacao: '' });
                setShowModal(true);
            };

            const handleEditClick = (quotation) => {
                console.log('[FRONTEND] Editando cotação:', quotation);
                setEditingQuotation(quotation);
                setFormData({ cotacao: quotation.cotacao, anotacao: quotation.anotacao });
                setShowModal(true);
            };

            const handleDeleteClick = (cotacao) => {
                console.log('[FRONTEND] Clicou em deletar cotação:', cotacao);
                setDeleteModal({ show: true, cotacao });
            };

            const confirmDelete = async () => {
                try {
                    setLoading(true);
                    const token = localStorage.getItem('token');
                    console.log('[FRONTEND] Enviando DELETE para:', `/api/quotations/${deleteModal.cotacao}`);
                    const response = await fetch(`/api/quotations/${deleteModal.cotacao}`, { 
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    console.log('[FRONTEND] Resposta DELETE:', response.status);
                    
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('username');
                        window.location.href = '/login.html';
                        return;
                    }
                    
                    showToast('Cotação deletada com sucesso!', 'success');
                    setDeleteModal({ show: false, cotacao: null });
                    fetchQuotations();
                } catch (error) {
                    console.error('[FRONTEND] Erro ao deletar cotação:', error);
                    showToast('Erro ao deletar cotação', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const cancelDelete = () => {
                setDeleteModal({ show: false, cotacao: null });
            };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    console.log('[FRONTEND] Submetendo formulário. editingQuotation:', editingQuotation);
                    console.log('[FRONTEND] formData:', formData);
                    
                    const token = localStorage.getItem('token');
                    
                    if (editingQuotation) {
                        console.log('[FRONTEND] Enviando PUT para:', `/api/quotations/${editingQuotation.cotacao}`);
                        const response = await fetch(`/api/quotations/${editingQuotation.cotacao}`, {
                            method: 'PUT',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(formData)
                        });
                        console.log('[FRONTEND] Resposta PUT:', response.status);
                        
                        if (response.status === 401 || response.status === 403) {
                            localStorage.removeItem('token');
                            localStorage.removeItem('username');
                            window.location.href = '/login.html';
                            return;
                        }
                        
                        showToast('Cotação atualizada com sucesso!', 'success');
                    } else {
                        console.log('[FRONTEND] Enviando POST para criar nova cotação');
                        const response = await fetch('/api/quotations', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(formData)
                        });
                        console.log('[FRONTEND] Resposta POST:', response.status);
                        
                        if (response.status === 401 || response.status === 403) {
                            localStorage.removeItem('token');
                            localStorage.removeItem('username');
                            window.location.href = '/login.html';
                            return;
                        }
                        
                        showToast('Cotação criada com sucesso!', 'success');
                    }
                    setShowModal(false);
                    fetchQuotations();
                } catch (error) {
                    console.error('[FRONTEND] Erro ao salvar cotação:', error);
                    showToast('Erro ao salvar cotação', 'error');
                } finally {
                    setSubmitting(false);
                }
            };

            const handlePageChange = (page) => {
                setCurrentPage(page);
            };

            const handlePreviousPage = () => {
                setCurrentPage(prev => Math.max(prev - 1, 1));
            };

            const handleNextPage = () => {
                setCurrentPage(prev => Math.min(prev + 1, Math.ceil(quotations.length / itemsPerPage)));
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                window.location.href = '/login.html';
            };

            const totalPages = Math.ceil(quotations.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentQuotations = quotations.slice(startIndex, endIndex);


            return (
                <div className="min-h-screen bg-gray-100">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-red-600 to-red-700 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 py-6 flex items-center justify-between">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight">Cadastro de Cotações</h1>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-sm font-medium bg-white/20 px-3 py-2 rounded-lg">
                                    {localStorage.getItem('username')}
                                </span>
                                <button 
                                    onClick={handleLogout}
                                    className="flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2.5 rounded-lg transition-all duration-200 hover:shadow-md transform hover:-translate-y-0.5"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                    <span className="font-medium">Sair</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {/* Search and Actions Bar */}
                        <div className="bg-white rounded-xl shadow-md p-4 mb-6">
                            <div className="flex flex-wrap items-center gap-4">
                                {/* Search Input */}
                                <div className="flex-1 min-w-[300px] relative">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                        {loading ? <LoadingSpinner /> : <SearchIcon />}
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="Buscar cotação (ex: Q123...)"
                                        value={searchTerm}
                                        onChange={handleSearch}
                                        className="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all duration-200 shadow-sm text-sm"
                                    />
                                    {searchTerm && (
                                        <button
                                            onClick={clearSearch}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                                        >
                                            <ClearIcon />
                                        </button>
                                    )}
                                </div>


                                {/* Add Button */}
                                <button onClick={handleAddClick} className="flex items-center gap-2 px-5 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all duration-200 font-medium shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                                    <PlusIcon />
                                    <span>Adicionar</span>
                                </button>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="bg-white rounded-xl shadow-md overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="bg-gradient-to-r from-gray-50 to-gray-100 border-b border-gray-200">
                                        <tr>
                                            <th className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">COTAÇÃO</th>
                                            <th className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">ANOTAÇÃO</th>
                                            <th className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">DATA DE CRIAÇÃO</th>
                                            <th className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">ÚLTIMA ALTERAÇÃO</th>
                                            <th className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">STATUS</th>
                                            <th className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">AÇÕES</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {initialLoading ? (
                                            [1, 2, 3].map((i) => (
                                                <tr key={i}>
                                                    <td className="px-6 py-4"><div className="h-4 w-24 rounded skeleton"></div></td>
                                                    <td className="px-6 py-4"><div className="h-4 w-40 rounded skeleton"></div></td>
                                                    <td className="px-6 py-4"><div className="h-4 w-28 rounded skeleton"></div></td>
                                                    <td className="px-6 py-4"><div className="h-4 w-28 rounded skeleton"></div></td>
                                                    <td className="px-6 py-4"><div className="h-6 w-20 rounded-full skeleton"></div></td>
                                                    <td className="px-6 py-4"><div className="h-8 w-16 rounded skeleton"></div></td>
                                                </tr>
                                            ))
                                        ) : quotations.length === 0 ? (
                                            <tr>
                                                <td colSpan="6" className="px-6 py-16 text-center">
                                                    <div className="flex flex-col items-center justify-center">
                                                        <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                                                            <SearchIcon />
                                                        </div>
                                                        <p className="text-gray-500 font-medium">Nenhuma cotação encontrada</p>
                                                        <p className="text-gray-400 text-sm mt-1">Tente ajustar sua busca</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            currentQuotations.map((quotation) => (
                                                <tr key={quotation.cotacao} className="hover:bg-gradient-to-r hover:from-gray-50 hover:to-white transition-all duration-200">
                                                    <td className="px-6 py-4 text-sm text-gray-700 font-mono font-semibold">{quotation.cotacao}</td>
                                                    <td className="px-6 py-4 text-sm text-gray-600">{quotation.anotacao || '-'}</td>
                                                    <td className="px-6 py-4 text-sm text-gray-600">
                                                        {quotation.createdAt || '-'}
                                                    </td>
                                                    <td className="px-6 py-4 text-sm text-gray-600">
                                                        {quotation.updatedAt || '-'}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <button
                                                            onClick={() => handleStatusClick(quotation)}
                                                            className={`px-3 py-1.5 text-xs font-bold rounded-full border transition-all duration-200 hover:shadow-md hover:scale-105 cursor-pointer flex items-center gap-1 ${
                                                                quotation.status === 'aprovado' 
                                                                    ? 'bg-green-100 text-green-800 border-green-200 hover:bg-green-200' 
                                                                    : quotation.status === 'reprovado'
                                                                    ? 'bg-red-100 text-red-800 border-red-200 hover:bg-red-200'
                                                                    : 'bg-yellow-100 text-yellow-800 border-yellow-200 hover:bg-yellow-200'
                                                            }`}
                                                        >
                                                            {quotation.status || 'pendente'}
                                                            <ChevronDownIcon />
                                                        </button>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex items-center gap-1">
                                                            <button
                                                                onClick={() => handleEditClick(quotation)}
                                                                className="p-2.5 text-blue-600 hover:bg-blue-100 rounded-lg transition-all duration-200 hover:scale-110 hover:shadow-md"
                                                                title="Editar"
                                                            >
                                                                <EditIcon />
                                                            </button>
                                                            <button
                                                                onClick={() => handleDeleteClick(quotation.cotacao)}
                                                                className="p-2.5 text-red-600 hover:bg-red-100 rounded-lg transition-all duration-200 hover:scale-110 hover:shadow-md"
                                                                title="Deletar"
                                                            >
                                                                <TrashIcon />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {/* Pagination */}
                            <div className="px-6 py-4 border-t border-gray-200 bg-gradient-to-r from-gray-50 to-white">
                                <div className="flex items-center justify-between">
                                    <p className="text-sm text-gray-600 font-medium">
                                        {loading ? 'Carregando...' : `Mostrando ${startIndex + 1}-${Math.min(endIndex, quotations.length)} de ${quotations.length} cotações`}
                                    </p>
                                    {totalPages > 1 && (
                                        <div className="flex items-center gap-2">
                                            <button
                                                onClick={handlePreviousPage}
                                                disabled={currentPage === 1}
                                                className="p-2 rounded-lg border border-gray-300 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            >
                                                <ChevronLeftIcon />
                                            </button>
                                            {Array.from({ length: totalPages }, (_, i) => i + 1).map(page => (
                                                <button
                                                    key={page}
                                                    onClick={() => handlePageChange(page)}
                                                    className={`px-3 py-1 rounded-lg text-sm font-medium transition-colors ${
                                                        currentPage === page
                                                            ? 'bg-red-600 text-white'
                                                            : 'border border-gray-300 hover:bg-gray-100 text-gray-700'
                                                    }`}
                                                >
                                                    {page}
                                                </button>
                                            ))}
                                            <button
                                                onClick={handleNextPage}
                                                disabled={currentPage === totalPages}
                                                className="p-2 rounded-lg border border-gray-300 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            >
                                                <ChevronRightIcon />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl modal-content">
                                <div className="flex items-center justify-between p-6 border-b border-gray-100">
                                    <div>
                                        <h2 className="text-xl font-bold text-gray-900">
                                            {editingQuotation ? 'Editar Cotação' : 'Nova Cotação'}
                                        </h2>
                                        <p className="text-sm text-gray-500 mt-1">
                                            {editingQuotation ? 'Atualize as informações da cotação' : 'Preencha os dados para criar uma nova cotação'}
                                        </p>
                                    </div>
                                    <button
                                        onClick={() => setShowModal(false)}
                                        className="p-2 hover:bg-gray-100 rounded-lg transition-all duration-200 hover:scale-110"
                                    >
                                        <XIcon />
                                    </button>
                                </div>
                                <form onSubmit={handleFormSubmit} className="p-6">
                                    <div className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">
                                                Cotação
                                            </label>
                                            <input
                                                type="text"
                                                value={formData.cotacao}
                                                onChange={(e) => setFormData({ ...formData, cotacao: e.target.value })}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all duration-200 shadow-sm"
                                                placeholder="Digite a cotação (ex: Q123...)"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">
                                                Anotação
                                            </label>
                                            <textarea
                                                value={formData.anotacao}
                                                onChange={(e) => setFormData({ ...formData, anotacao: e.target.value })}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all duration-200 resize-none shadow-sm"
                                                rows="3"
                                                placeholder="Digite suas anotações"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">
                                                Data de Criação
                                            </label>
                                            <input
                                                type="text"
                                                value={editingQuotation 
                                                    ? new Date(editingQuotation.createdAt).toLocaleString('pt-BR', { 
                                                        day: '2-digit', 
                                                        month: '2-digit', 
                                                        year: 'numeric',
                                                        hour: '2-digit',
                                                        minute: '2-digit'
                                                    }).replace(',', '')
                                                    : new Date().toLocaleString('pt-BR', { 
                                                        day: '2-digit', 
                                                        month: '2-digit', 
                                                        year: 'numeric',
                                                        hour: '2-digit',
                                                        minute: '2-digit'
                                                    }).replace(',', '')
                                                }
                                                readOnly
                                                className="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">
                                                Última Alteração
                                            </label>
                                            <input
                                                type="text"
                                                value={editingQuotation && editingQuotation.updatedAt
                                                    ? new Date(editingQuotation.updatedAt).toLocaleString('pt-BR', { 
                                                        day: '2-digit', 
                                                        month: '2-digit', 
                                                        year: 'numeric',
                                                        hour: '2-digit',
                                                        minute: '2-digit'
                                                    }).replace(',', '')
                                                    : new Date().toLocaleString('pt-BR', { 
                                                        day: '2-digit', 
                                                        month: '2-digit', 
                                                        year: 'numeric',
                                                        hour: '2-digit',
                                                        minute: '2-digit'
                                                    }).replace(',', '')
                                                }
                                                readOnly
                                                className="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed"
                                            />
                                        </div>
                                    </div>
                                    <div className="mt-6 flex gap-3">
                                        <button
                                            type="button"
                                            onClick={() => setShowModal(false)}
                                            className="flex-1 px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all duration-200 font-medium text-gray-700 hover:shadow-md"
                                        >
                                            Cancelar
                                        </button>
                                        <button
                                            type="submit"
                                            disabled={submitting}
                                            className="flex-1 px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-all duration-200 font-medium shadow-md hover:shadow-lg transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                                        >
                                            {submitting ? <LoadingSpinner /> : (editingQuotation ? 'Atualizar' : 'Salvar')}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast && (
                        <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 toast-enter ${
                            toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'
                        }`}>
                            {toast.type === 'success' ? <CheckIcon /> : <ErrorIcon />}
                            <span className="font-medium">{toast.message}</span>
                        </div>
                    )}

                    {/* Status Selection Modal */}
                    {statusModal.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm modal-content">
                                <div className="p-6">
                                    <h3 className="text-lg font-bold text-gray-900 mb-2">Alterar Status</h3>
                                    <p className="text-sm text-gray-500 mb-6">
                                        Selecione o novo status para a cotação <span className="font-semibold text-gray-700">{statusModal.quotation?.cotacao}</span>
                                    </p>
                                    <div className="space-y-3">
                                        <button
                                            onClick={() => handleStatusChange('aprovado')}
                                            disabled={loading}
                                            className="w-full px-4 py-3 bg-green-100 text-green-800 border-2 border-green-200 rounded-lg hover:bg-green-200 hover:border-green-300 transition-all duration-200 font-semibold flex items-center justify-between group disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <span className="flex items-center gap-2">
                                                <span className="w-3 h-3 bg-green-600 rounded-full"></span>
                                                Aprovado
                                            </span>
                                            {statusModal.quotation?.status === 'aprovado' && <CheckIcon />}
                                        </button>
                                        <button
                                            onClick={() => handleStatusChange('pendente')}
                                            disabled={loading}
                                            className="w-full px-4 py-3 bg-yellow-100 text-yellow-800 border-2 border-yellow-200 rounded-lg hover:bg-yellow-200 hover:border-yellow-300 transition-all duration-200 font-semibold flex items-center justify-between group disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <span className="flex items-center gap-2">
                                                <span className="w-3 h-3 bg-yellow-600 rounded-full"></span>
                                                Pendente
                                            </span>
                                            {statusModal.quotation?.status === 'pendente' && <CheckIcon />}
                                        </button>
                                        <button
                                            onClick={() => handleStatusChange('reprovado')}
                                            disabled={loading}
                                            className="w-full px-4 py-3 bg-red-100 text-red-800 border-2 border-red-200 rounded-lg hover:bg-red-200 hover:border-red-300 transition-all duration-200 font-semibold flex items-center justify-between group disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <span className="flex items-center gap-2">
                                                <span className="w-3 h-3 bg-red-600 rounded-full"></span>
                                                Reprovado
                                            </span>
                                            {statusModal.quotation?.status === 'reprovado' && <CheckIcon />}
                                        </button>
                                    </div>
                                    <button
                                        onClick={() => setStatusModal({ show: false, quotation: null })}
                                        className="mt-4 w-full px-4 py-2 text-gray-600 hover:text-gray-800 font-medium transition-colors"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Delete Confirmation Modal */}
                    {deleteModal.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md modal-content">
                                <div className="p-6">
                                    <div className="flex items-center gap-4 mb-4">
                                        <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                                            <TrashIcon />
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-bold text-gray-900">Confirmar Exclusão</h3>
                                            <p className="text-sm text-gray-500">
                                                Cotação: <span className="font-semibold text-gray-700">{deleteModal.cotacao}</span>
                                            </p>
                                        </div>
                                    </div>
                                    <p className="text-gray-600 mb-6">
                                        Tem certeza que deseja deletar esta cotação? Esta ação não pode ser desfeita.
                                    </p>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={cancelDelete}
                                            disabled={loading}
                                            className="flex-1 px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all duration-200 font-medium text-gray-700 hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Cancelar
                                        </button>
                                        <button
                                            onClick={confirmDelete}
                                            disabled={loading}
                                            className="flex-1 px-4 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-all duration-200 font-medium shadow-md hover:shadow-lg transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2"
                                        >
                                            {loading ? <LoadingSpinner /> : 'Deletar'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
