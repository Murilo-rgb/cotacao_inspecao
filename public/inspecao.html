<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Distribuição de cotações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .dropzone {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
        }
        .dropzone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .dropzone.has-file {
            border-color: #10b981;
            background-color: #ecfdf5;
        }
        .checkbox-cell input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .selected-row {
            background-color: #eef2ff !important;
        }

        /* ===== DARK MODE STYLES ===== */
        html, html *, html *::before, html *::after {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }
        html.dark { background-color: #0f172a; }
        html.dark body { background-color: #0f172a; }
        html.dark .bg-white { background-color: #1e293b !important; }
        html.dark .bg-slate-50, html.dark .bg-slate-50\/80 { background-color: #0f172a !important; }
        html.dark .bg-slate-100 { background-color: #1e293b !important; }
        html.dark .bg-slate-800 { background-color: #334155 !important; }
        html.dark .border-slate-200, html.dark .border-slate-300 { border-color: #334155 !important; }
        html.dark .border-slate-700 { border-color: #475569 !important; }
        html.dark .divide-slate-200 > *, html.dark .divide-slate-100 > * { border-color: #334155 !important; }
        html.dark .text-slate-500, html.dark .text-slate-400 { color: #94a3b8 !important; }
        html.dark .text-slate-600 { color: #cbd5e1 !important; }
        html.dark .text-slate-700 { color: #e2e8f0 !important; }
        html.dark .text-slate-800, html.dark .text-slate-900 { color: #f1f5f9 !important; }
        html.dark .text-white { color: #f8fafc !important; }
        html.dark .placeholder-slate-400::placeholder { color: #64748b !important; }
        html.dark header { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark table thead { background-color: #1e293b !important; }
        html.dark table thead th { color: #94a3b8 !important; }
        html.dark table tbody { background-color: #1e293b !important; }
        html.dark table tbody tr { background-color: #1e293b !important; }
        html.dark table tbody tr:hover { background-color: #334155 !important; }
        html.dark input, html.dark select, html.dark textarea {
            background-color: #1e293b !important;
            border-color: #475569 !important;
            color: #e2e8f0 !important;
        }
        html.dark input:focus, html.dark select:focus, html.dark textarea:focus {
            border-color: #8b5cf6 !important;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2) !important;
        }
        html.dark input:disabled, html.dark textarea:disabled, html.dark input[readonly], html.dark textarea[readonly] {
            background-color: #0f172a !important;
            color: #64748b !important;
        }
        html.dark .bg-slate-100 { background-color: #1e293b !important; }
        html.dark .shadow-sm, html.dark .shadow-md, html.dark .shadow-lg, html.dark .shadow-xl, html.dark .shadow-2xl {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3) !important;
        }
        html.dark .bg-emerald-50 { background-color: rgba(5, 150, 105, 0.15) !important; }
        html.dark .text-emerald-700 { color: #34d399 !important; }
        html.dark .border-emerald-200 { border-color: rgba(5, 150, 105, 0.3) !important; }
        html.dark .bg-red-50 { background-color: rgba(220, 38, 38, 0.15) !important; }
        html.dark .text-red-700 { color: #f87171 !important; }
        html.dark .border-red-200 { border-color: rgba(220, 38, 38, 0.3) !important; }
        html.dark .bg-amber-50 { background-color: rgba(217, 119, 6, 0.15) !important; }
        html.dark .text-amber-700 { color: #fbbf24 !important; }
        html.dark .border-amber-200 { border-color: rgba(217, 119, 6, 0.3) !important; }
        html.dark .bg-violet-50 { background-color: rgba(139, 92, 246, 0.15) !important; }
        html.dark .text-violet-700 { color: #a78bfa !important; }
        html.dark .border-violet-200 { border-color: rgba(139, 92, 246, 0.3) !important; }
        html.dark .bg-indigo-100 { background-color: rgba(99, 102, 241, 0.15) !important; }
        html.dark .bg-blue-50 { background-color: rgba(59, 130, 246, 0.15) !important; }
        html.dark .bg-orange-50 { background-color: rgba(249, 115, 22, 0.15) !important; }
        html.dark .modal-content { background-color: #1e293b !important; }
        html.dark .skeleton, html.dark .animate-pulse div { background-color: #334155 !important; }
        html.dark .bg-gradient-to-r { opacity: 0.9; }
        html.dark .selected-row { background-color: rgba(99, 102, 241, 0.15) !important; }
        html.dark .bg-emerald-50\/30 { background-color: rgba(5, 150, 105, 0.08) !important; }
    </style>
    <script>
    (function() {
        const saved = localStorage.getItem('darkMode');
        if (saved === 'true') {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect, useCallback, useRef } = React;

        // ============== ICONES ==============
        const UploadIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "24", height: "24", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },

        const AlertIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" }),

        );
        const LogoutIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" }),

            React.createElement('line', { x1: "21", x2: "9", y1: "12", y2: "12" })
        );
        const RefreshIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('polyline', { points: "23 4 23 10 17 10" }),
            React.createElement('path', { d: "M20.49 15a9 9 0 1 1-2.12-9.36L23 10" })
        );
        const SendIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('line', { x1: "22", y1: "2", x2: "11", y2: "13" }),
            React.createElement('polygon', { points: "22 2 15 22 11 13 2 9 22 2" })
        );
        const FileIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }),
            React.createElement('polyline', { points: "14 2 14 8 20 8" })
        );
        const RedistributeIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('polyline', { points: "1 4 1 10 7 10" }),
            React.createElement('polyline', { points: "23 20 23 14 17 14" }),
            React.createElement('path', { d: "M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" })
        );
        const SunIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('circle', { cx: "12", cy: "12", r: "5" }),
            React.createElement('line', { x1: "12", y1: "1", x2: "12", y2: "3" }),
            React.createElement('line', { x1: "12", y1: "21", x2: "12", y2: "23" }),
            React.createElement('line', { x1: "4.22", y1: "4.22", x2: "5.64", y2: "5.64" }),
            React.createElement('line', { x1: "18.36", y1: "18.36", x2: "19.78", y2: "19.78" }),
            React.createElement('line', { x1: "1", y1: "12", x2: "3", y2: "12" }),
            React.createElement('line', { x1: "21", y1: "12", x2: "23", y2: "12" }),
            React.createElement('line', { x1: "4.22", y1: "19.78", x2: "5.64", y2: "18.36" }),
            React.createElement('line', { x1: "18.36", y1: "5.64", x2: "19.78", y2: "4.22" })
        );
        const MoonIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" })
        );

        // ============== COMPONENTE PRINCIPAL ==============
        function App() {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [username, setUsername] = useState(localStorage.getItem('username') || '');
            const [tarefas, setTarefas] = useState([]);
            const [usuarios, setUsuarios] = useState([]);
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [atualizando, setAtualizando] = useState(false);
            const [distribuindo, setDistribuindo] = useState(false);
            const [dragActive, setDragActive] = useState(false);
            const [fileInfo, setFileInfo] = useState(null);
            const [toast, setToast] = useState(null);
            const [stats, setStats] = useState({ total: 0, fila: 0, enviado: 0, statusCounts: {} });
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [massAssignUsuario, setMassAssignUsuario] = useState('');
            const [redistribuirMode, setRedistribuirMode] = useState(false);
            const fileInputRef = useRef(null);
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('darkMode');
                return saved === 'true';
            });
            const [statusModalData, setStatusModalData] = useState(null);

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            const toggleDarkMode = () => setDarkMode(prev => !prev);

            const getBasePath = () => window.location.pathname.startsWith('/pme_notas') ? '/pme_notas' : '';

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            // Verificar token
            useEffect(() => {
                const t = localStorage.getItem('token');
                if (!t) {
                    window.location.href = getBasePath() + '/login.html';
                    return;
                }
                setToken(t);
                const storedUser = localStorage.getItem('username');
                if (storedUser) setUsername(storedUser);
            }, []);

            // Buscar tarefas
            const fetchTarefas = useCallback(async () => {
                if (!token) return;
                try {
                    setLoading(true);
                    const res = await fetch(`${getBasePath()}/api/inspecao/tarefas`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401 || res.status === 403) {
                        localStorage.removeItem('token');
                        window.location.href = getBasePath() + '/login.html';
                        return;
                    }
                    const data = await res.json();
                    setTarefas(data);
                    const total = data.length;
                    const enviado = data.filter(t => t.status_distribuicao === 'Enviado').length;
                    const fila = data.filter(t => t.status_distribuicao === 'Fila' && (!t.pendente_com || t.pendente_com === '-')).length;
                    const statusCounts = {};
                    data.forEach(t => {
                        const status = getCotacaoStatus(t);
                        statusCounts[status] = (statusCounts[status] || 0) + 1;
                    });
                    setStats({ total, fila, enviado, statusCounts });
                } catch (err) {
                    console.error('Erro ao buscar tarefas:', err);
                    showToast('Erro ao carregar tarefas', 'error');
                } finally {
                    setLoading(false);
                }
            }, [token]);

            // Buscar usuários
            const fetchUsuarios = useCallback(async () => {
                if (!token) return;
                try {
                    const res = await fetch(`${getBasePath()}/api/inspecao/usuarios`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    setUsuarios(data);
                } catch (err) {
                    console.error('Erro ao buscar usuários:', err);
                }
            }, [token]);

            useEffect(() => {
                if (token) {
                    fetchTarefas();
                    fetchUsuarios();
                }
            }, [token, fetchTarefas, fetchUsuarios]);

            // Upload
            const handleUpload = async (file) => {
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext !== 'csv' && ext !== 'zip') {
                    showToast('Apenas arquivos .csv ou .zip são permitidos', 'error');
                    return;
                }
                
                setFileInfo({ name: file.name, size: (file.size / 1024 / 1024).toFixed(2) + ' MB' });
                setUploading(true);
                
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const res = await fetch(`${getBasePath()}/api/inspecao/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    
                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message || 'Arquivo processado com sucesso!', 'success');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao processar arquivo', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao enviar arquivo: ' + err.message, 'error');
                } finally {
                    setUploading(false);
                }
            };

            // Drag & Drop handlers
            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') {
                    setDragActive(true);
                } else if (e.type === 'dragleave') {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleUpload(e.dataTransfer.files[0]);
                }
            };

            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files[0]) {
                    handleUpload(e.target.files[0]);
                }
            };

            // ===== SELEÇÃO EM MASSA =====
            const toggleSelect = (codTarefa) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(codTarefa)) {
                        next.delete(codTarefa);
                    } else {
                        next.add(codTarefa);
                    }
                    return next;
                });
            };

            const toggleSelectAll = () => {
                const visible = filteredTarefas;
                if (selectedIds.size === visible.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(visible.map(t => t.cod_tarefa)));
                }
            };

            const handleMassAssign = (usuarioId) => {
                let id = usuarioId;
                if (typeof usuarioId === 'string') {
                    const m = usuarioId.match(/^(\d+)\s*-/);
                    if (m) id = m[1];
                }
                setMassAssignUsuario(id);
                if (selectedIds.size === 0) {
                    showToast('Selecione ao menos uma tarefa primeiro', 'error');
                    return;
                }
                // Aplicar o usuário selecionado a todas as tarefas marcadas
                setTarefas(prev => prev.map(t =>
                    selectedIds.has(t.cod_tarefa)
                        ? { ...t, usuarioSelecionado: id }
                        : t
                ));
                showToast(`Usuário atribuído a ${selectedIds.size} tarefa(s)`, 'success');
            };

            // ===== DISTRIBUIR / REDISTRIBUIR =====
            const handleDistribuir = async () => {
                const podeDistribuir = (t) => {
                    if (redistribuirMode) {
                        // No modo redistribuir, aceita tarefas Fila OU Enviado com usuário selecionado
                        return t.usuarioSelecionado;
                    }
                    return t.status_distribuicao === 'Fila' && t.usuarioSelecionado;
                };

                const selecionadas = tarefas.filter(podeDistribuir);
                
                if (selecionadas.length === 0) {
                    showToast(
                        redistribuirMode 
                            ? 'Selecione tarefas e atribua um usuário para redistribuir' 
                            : 'Selecione usuários para as tarefas em "Fila"',
                        'error'
                    );
                    return;
                }

                // Proteção: verificar se muitas tarefas vão para o mesmo usuário
                const countPorUsuario = {};
                selecionadas.forEach(t => {
                    const uid = String(t.usuarioSelecionado);
                    countPorUsuario[uid] = (countPorUsuario[uid] || 0) + 1;
                });
                const usuarioNome = (id) => {
                    const u = usuarios.find(u => String(u.id) === String(id));
                    return u ? u.nome : id;
                };
                const alertas = Object.entries(countPorUsuario)
                    .filter(([uid, count]) => count > 10)
                    .map(([uid, count]) => `${count} para ${usuarioNome(uid)}`);
                
                if (alertas.length > 0) {
                    if (!window.confirm(`Muitas tarefas atribuídas para o mesmo usuário:\n${alertas.join('\n')}\n\nContinuar assim mesmo?`)) {
                        return;
                    }
                }
                
                setDistribuindo(true);
                
                const distribuicoes = selecionadas.map(t => ({
                    cod_tarefa: t.cod_tarefa,
                    usuario_id: parseInt(t.usuarioSelecionado)
                }));

                const endpoint = redistribuirMode 
                    ? `${getBasePath()}/api/inspecao/redistribuir`
                    : `${getBasePath()}/api/inspecao/distribuir`;
                const body = redistribuirMode
                    ? JSON.stringify({ redistribuicoes: distribuicoes })
                    : JSON.stringify({ distribuicoes });
                
                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body
                    });
                    
                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message, 'success');
                        setSelectedIds(new Set());
                        setMassAssignUsuario('');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao distribuir', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao distribuir: ' + err.message, 'error');
                } finally {
                    setDistribuindo(false);
                }
            };

            const handleAtualizar = async () => {
                try {
                    setAtualizando(true);
                    const res = await fetch(`${getBasePath()}/api/inspecao/atualizar_r_000250`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(data.message || 'Tabela atualizada com sucesso!', 'success');
                        fetchTarefas();
                    } else {
                        showToast(data.error || 'Erro ao atualizar tabela', 'error');
                    }
                } catch (err) {
                    showToast('Erro ao atualizar: ' + err.message, 'error');
                } finally {
                    setAtualizando(false);
                }
            };

            // ===== ATUALIZAR STATUS DA COTAÇÃO (Modal) =====
            const handleUpdateStatus = async (tarefa, newStatus) => {
                if (!tarefa) return;
                try {
                    const codTarefa = tarefa.cod_tarefa;
                    const res = await fetch(`${getBasePath()}/api/quotations/${encodeURIComponent(codTarefa)}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
