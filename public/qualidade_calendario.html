        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .day-card { transition: all 0.2s ease; }
        .day-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
    </style>

<body>

        const TargetIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "16", height: "16", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement('circle', { cx: "12", cy: "12", r: "10" }), React.createElement('circle', { cx: "12", cy: "12", r: "6" }), React.createElement('circle', { cx: "12", cy: "12", r: "2" }));
        const CheckCircleIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "16", height: "16", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement('path', { d: "M22 11.08V12a10 10 0 1 1-5.93-9.14" }), React.createElement('polyline', { points: "22 4 12 14.01 9 11.01" }));
        const CalendarIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement('rect', { x: "3", y: "4", width: "18", height: "18", rx: "2", ry: "2" }), React.createElement('line', { x1: "16", y1: "2", x2: "16", y2: "6" }), React.createElement('line', { x1: "8", y1: "2", x2: "8", y2: "6" }), React.createElement('line', { x1: "3", y1: "10", x2: "21", y2: "10" }));
        const UserIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "18", height: "18", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, React.createElement('path', { d: "M19 21v-2a4 4 0 0 0-4-4H9a2 2 0 0 0-4 4v2" }), React.createElement('circle', { cx: "12", cy: "7", r: "4" }));

        const SunIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('circle', { cx: "12", cy: "12", r: "5" }),
            React.createElement('line', { x1: "12", y1: "1", x2: "12", y2: "3" }),
            React.createElement('line', { x1: "12", y1: "21", x2: "12", y2: "23" }),
            React.createElement('line', { x1: "4.22", y1: "4.22", x2: "5.64", y2: "5.64" }),
            React.createElement('line', { x1: "18.36", y1: "18.36", x2: "19.78", y2: "19.78" }),
            React.createElement('line', { x1: "1", y1: "12", x2: "3", y2: "12" }),
            React.createElement('line', { x1: "21", y1: "12", x2: "23", y2: "12" }),
            React.createElement('line', { x1: "4.22", y1: "19.78", x2: "5.64", y2: "18.36" }),
            React.createElement('line', { x1: "18.36", y1: "5.64", x2: "19.78", y2: "4.22" })
        );
        const MoonIcon = () => React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", width: "20", height: "20", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
            React.createElement('path', { d: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" })

        function getDiasNoMes(mes, ano) {
            return new Date(ano, mes, 0).getDate();
        }

        function getPrimeiroDiaSemana(mes, ano) {
            return new Date(ano, mes - 1, 1).getDay();
        }

        function getCorPercentual(pct) {
            if (pct >= 80) return { bg: 'bg-green-100', text: 'text-green-800', bar: 'bg-green-500', border: 'border-green-300' };
            if (pct >= 50) return { bg: 'bg-amber-100', text: 'text-amber-800', bar: 'bg-amber-500', border: 'border-amber-300' };
            if (pct >= 30) return { bg: 'bg-orange-100', text: 'text-orange-800', bar: 'bg-orange-500', border: 'border-orange-300' };
            if (pct > 0) return { bg: 'bg-red-100', text: 'text-red-800', bar: 'bg-red-500', border: 'border-red-300' };
            return { bg: 'bg-gray-100', text: 'text-gray-500', bar: 'bg-gray-300', border: 'border-gray-200' };
        }

        function App() {
            const hoje = new Date();
            const [mes, setMes] = useState(hoje.getMonth() + 1);
            const [ano, setAno] = useState(hoje.getFullYear());

            const [loading, setLoading] = useState(true);
            const [username, setUsername] = useState('');
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('darkMode');
                return saved === 'true';
            });

            const BASE_PATH = window.location.pathname.startsWith('/pme_notas') ? '/pme_notas' : '';

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            const toggleDarkMode = () => setDarkMode(prev => !prev);

            useEffect(() => {
                const storedUsername = localStorage.getItem('username');
                if (storedUsername) setUsername(storedUsername);
            }, []);

            const fetchDados = useCallback(() => {
                setLoading(true);
                const apiUrl = window.location.pathname.startsWith('/pme_notas')
                    ? `/pme_notas/api/qualidade/calendario?mes=${mes}&ano=${ano}`
                    : `/api/qualidade/calendario?mes=${mes}&ano=${ano}`;
                fetch(apiUrl)
                    .then(r => r.json())
                    .then(data => {
                        setDados(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('[CALENDARIO] Erro:', err);
                        setLoading(false);
                    });
            }, [mes, ano]);

            useEffect(() => { fetchDados(); }, [fetchDados]);

            const handlePrevMonth = () => {
                if (mes === 1) { setMes(12); setAno(a => a - 1); }
                else { setMes(m => m - 1); }
            };

            const handleNextMonth = () => {
                if (mes === 12) { setMes(1); setAno(a => a + 1); }
                else { setMes(m => m + 1); }
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                window.location.href = BASE_PATH + '/login.html';
            };

            const diasNoMes = getDiasNoMes(mes, ano);
            const primeiroDia = getPrimeiroDiaSemana(mes, ano);
            const diasArray = Array.from({ length: diasNoMes }, (_, i) => i + 1);

            // Mapa de dados por dia
            const dadosMap = {};
            if (dados && dados.dias) {
                dados.dias.forEach(d => { dadosMap[d.dia] = d; });
            }

            const resumo = dados?.resumo || { total_tarefas: 0, total_auditadas: 0, percentual: 0 };
            const corResumo = getCorPercentual(resumo.percentual);

            return React.createElement('div', { className: "min-h-screen bg-slate-50/80" },
                // Header
                React.createElement('header', { className: "bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" },
                        React.createElement('div', { className: "flex justify-between items-center h-16" },
                            React.createElement('div', { className: "flex items-center gap-3" },
                                React.createElement('div', { className: "w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center shadow-md" },
                                    React.createElement(CalendarIcon)
                                ),
                                React.createElement('div', null,
                                    React.createElement('h1', { className: "text-xl font-bold text-slate-800" }, 'Calendário de Qualidade'),
                                    React.createElement('p', { className: "text-xs text-slate-500" }, 'Acompanhamento de auditorias por dia')
                                )
                            ),
                            React.createElement('div', { className: "flex items-center gap-4" },
                                React.createElement('div', { className: "hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-full shadow-sm" },

                                    React.createElement('span', { className: "text-sm font-semibold text-white" }, username || 'Usuário')
                                ),
                                React.createElement('button', { onClick: handleLogout, className: "flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors duration-200" }, React.createElement(LogoutIcon), React.createElement('span', { className: "hidden sm:inline" }, 'Sair'))
                            )
                        )
                    )
                ),

                // Main content
                React.createElement('main', { className: "max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8" },
                    // Navigation and Summary
                    React.createElement('div', { className: "flex flex-col sm:flex-row items-center justify-between gap-4 mb-8" },
                        React.createElement('div', { className: "flex items-center gap-4" },
                            React.createElement('button', { onClick: handlePrevMonth, className: "p-2.5 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 hover:border-slate-400 transition-all duration-200 shadow-sm" }, React.createElement(ArrowLeftIcon)),
                            React.createElement('h2', { className: "text-2xl font-bold text-slate-800 min-w-[200px] text-center" }, `${MESES[mes - 1]} ${ano}`),
                            React.createElement('button', { onClick: handleNextMonth, className: "p-2.5 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 hover:border-slate-400 transition-all duration-200 shadow-sm" }, React.createElement(ArrowRightIcon))
                        ),
                        React.createElement('div', { className: `flex items-center gap-6 px-6 py-3 rounded-2xl border ${corResumo.border} ${corResumo.bg} shadow-sm scale-in` },
                            React.createElement('div', { className: "flex items-center gap-2" },
                                React.createElement(TargetIcon),
                                React.createElement('span', { className: "text-sm font-medium text-slate-600" }, 'Tarefas:'),
                                React.createElement('span', { className: "text-lg font-bold text-slate-800" }, resumo.total_tarefas)
                            ),
                            React.createElement('div', { className: "w-px h-8 bg-slate-300" }),
                            React.createElement('div', { className: "flex items-center gap-2" },
                                React.createElement(CheckCircleIcon),
                                React.createElement('span', { className: "text-sm font-medium text-slate-600" }, 'Auditadas:'),
                                React.createElement('span', { className: "text-lg font-bold text-green-700" }, resumo.total_auditadas)
                            ),
                            React.createElement('div', { className: "w-px h-8 bg-slate-300" }),
                            React.createElement('div', { className: "flex items-center gap-2" },
                                React.createElement('span', { className: "text-sm font-medium text-slate-600" }, '%:'),
                                React.createElement('span', { className: `text-lg font-bold ${corResumo.text}` }, `${resumo.percentual}%`)
                            )
                        )
                    ),

                    // Calendar Grid
                    React.createElement('div', { className: "bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6 fade-in" },
                        // Day headers
                        React.createElement('div', { className: "grid grid-cols-7 gap-1 sm:gap-2 mb-2" },
                            DIAS_SEMANA.map(d => React.createElement('div', { key: d, className: "text-center text-xs font-semibold text-slate-500 uppercase tracking-wider py-2" }, d))
                        ),

                        // Calendar days
                        React.createElement('div', { className: "grid grid-cols-7 gap-1 sm:gap-2" },
                            // Empty cells before first day
                            Array.from({ length: primeiroDia }, (_, i) => React.createElement('div', { key: `empty-${i}`, className: "min-h-[80px] sm:min-h-[100px]" })),

                            // Day cells
                            diasArray.map(dia => {
                                const info = dadosMap[dia];
                                const temDados = info && info.total > 0;
                                const total = info?.total || 0;
                                const auditadas = info?.auditadas || 0;
                                const pct = total > 0 ? Math.round((auditadas / total) * 100) : 0;
                                const cor = getCorPercentual(pct);
                                const isToday = dia === hoje.getDate() && mes === hoje.getMonth() + 1 && ano === hoje.getFullYear();

                                const handleDoubleClick = () => {
                                    if (temDados) {
                                        const mesStr = String(mes).padStart(2, '0');
                                        const diaStr = String(dia).padStart(2, '0');
                                        const dataISO = `${ano}-${mesStr}-${diaStr}`;
                                        window.location.href = `${BASE_PATH}/qualidade?dateStart=${dataISO}`;
                                    }
                                };

                                return React.createElement('div', { key: dia, onDoubleClick: handleDoubleClick, className: `day-card rounded-xl p-2 sm:p-3 border ${temDados ? cor.border : 'border-slate-100'} ${temDados ? cor.bg : 'bg-slate-50'} ${isToday ? 'ring-2 ring-blue-400 ring-offset-2' : ''} min-h-[80px] sm:min-h-[100px] flex flex-col ${temDados ? 'cursor-pointer' : 'cursor-default'}` },
                                    React.createElement('div', { className: "flex items-center justify-between mb-1" },
                                        React.createElement('span', { className: `text-sm sm:text-base font-bold ${isToday ? 'text-blue-600' : temDados ? 'text-slate-800' : 'text-slate-400'}` }, dia),
                                        isToday && React.createElement('span', { className: "text-[10px] font-semibold text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded-full" }, 'HOJE')
                                    ),
                                    temDados
                                        ? React.createElement('div', { className: "flex-1 flex flex-col justify-between gap-1" },
                                            React.createElement('div', { className: "flex items-center gap-1 text-[11px] sm:text-xs" },
                                                React.createElement(TargetIcon),
                                                React.createElement('span', { className: "font-medium text-slate-600" }, total),
                                                React.createElement('span', { className: "text-slate-400" }, '·'),
                                                React.createElement(CheckCircleIcon),
                                                React.createElement('span', { className: "font-medium text-green-700" }, auditadas)
                                            ),
                                            React.createElement('div', { className: "w-full h-1.5 bg-slate-200 rounded-full overflow-hidden" },
                                                React.createElement('div', { className: `h-full rounded-full transition-all duration-500 ${cor.bar}`, style: { width: `${Math.min(pct, 100)}%` } })
                                            ),
                                            React.createElement('div', { className: `text-[10px] sm:text-xs font-semibold ${cor.text} text-right` }, `${pct}%`)
                                        )
                                        : React.createElement('div', { className: "flex-1 flex items-center justify-center" },
                                            React.createElement('span', { className: "text-[10px] text-slate-400" }, '—')
                                        )
                                );
                            })
                        )
                    ),

                    // Legend
                    React.createElement('div', { className: "mt-6 flex flex-wrap items-center gap-6 bg-white rounded-xl border border-slate-200 p-4 shadow-sm" },
                        React.createElement('span', { className: "text-sm font-semibold text-slate-600" }, 'Legenda:'),
                        React.createElement('div', { className: "flex items-center gap-2" }, React.createElement('div', { className: "w-3 h-3 rounded bg-green-500" }), React.createElement('span', { className: "text-xs text-slate-500" }, '≥ 80%')),
                        React.createElement('div', { className: "flex items-center gap-2" }, React.createElement('div', { className: "w-3 h-3 rounded bg-amber-500" }), React.createElement('span', { className: "text-xs text-slate-500" }, '50-79%')),
                        React.createElement('div', { className: "flex items-center gap-2" }, React.createElement('div', { className: "w-3 h-3 rounded bg-orange-500" }), React.createElement('span', { className: "text-xs text-slate-500" }, '30-49%')),
                        React.createElement('div', { className: "flex items-center gap-2" }, React.createElement('div', { className: "w-3 h-3 rounded bg-red-500" }), React.createElement('span', { className: "text-xs text-slate-500" }, '1-29%')),
                        React.createElement('div', { className: "flex items-center gap-2" }, React.createElement('div', { className: "w-3 h-3 rounded bg-gray-300" }), React.createElement('span', { className: "text-xs text-slate-500" }, 'Sem dados'))
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
